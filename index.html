<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Nexo Finanzas - PWA de finanzas personales offline-first" />
  <title>Nexo Finanzas</title>
  <link rel="manifest" href="./manifest.json" />
  <style>
    :root {
      --bg: #0b1220;
      --surface: #111827;
      --surface-2: #172033;
      --surface-3: #1f2a3d;
      --border: rgba(148, 163, 184, 0.18);
      --text: #e5eefb;
      --muted: #8ea0b9;
      --primary: #14b8a6;
      --primary-2: #0f766e;
      --income: #22c55e;
      --expense: #f97316;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #38bdf8;
      --radius: 18px;
      --radius-sm: 12px;
      --shadow: 0 12px 30px rgba(0,0,0,.24);
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px; --space-8: 32px;
      --maxw: 1400px;
    }
    [data-theme="light"] {
      --bg: #f3f7fb;
      --surface: #ffffff;
      --surface-2: #eef4fa;
      --surface-3: #e7eef7;
      --border: rgba(15, 23, 42, 0.09);
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0f766e;
      --primary-2: #14b8a6;
      --income: #16a34a;
      --expense: #ea580c;
      --danger: #dc2626;
      --warning: #d97706;
      --info: #0284c7;
      --shadow: 0 12px 30px rgba(2, 8, 23, .08);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    body { font-variant-numeric: tabular-nums; }
    button, input, select, textarea { font: inherit; }

    .app { min-height: 100dvh; display: grid; grid-template-columns: 88px 1fr; }
    .sidebar {
      position: sticky; top: 0; height: 100dvh;
      padding: var(--space-4) var(--space-3);
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: var(--space-4);
    }
    .brand { display: grid; place-items: center; gap: 10px; }
    .brand svg { width: 38px; height: 38px; color: var(--primary); }
    .brand span { font-size: 12px; color: var(--muted); text-align: center; }

    .nav { display: grid; gap: 10px; }
    .nav-btn, .theme-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
      border-radius: 16px;
      min-height: 52px;
      display: grid; place-items: center;
      cursor: pointer;
    }
    .nav-btn.active, .nav-btn:hover, .theme-btn:hover {
      color: var(--text);
      background: var(--surface-3);
      border-color: var(--border);
    }

    .main { min-width: 0; }
    .topbar {
      position: sticky; top: 0; z-index: 5;
      backdrop-filter: blur(14px);
      background: color-mix(in srgb, var(--bg) 78%, transparent);
      border-bottom: 1px solid var(--border);
      padding: var(--space-4) var(--space-5);
      display: flex; align-items: center; justify-content: space-between; gap: var(--space-4);
    }
    .topbar h1 { margin: 0; font-size: clamp(1.15rem, 1rem + 1vw, 1.8rem); }
    .topbar-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    .pill {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
    }
    .status-online { color: var(--income); }
    .status-offline { color: var(--warning); }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 600;
      background: var(--surface-3);
      color: var(--text);
    }
    .btn.primary { background: var(--primary); color: #031817; }
    .btn.ghost {
      background: transparent;
      border: 1px solid var(--border);
    }
    .btn.danger {
      background: var(--danger);
      color: #fff;
    }

    .content {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: var(--space-5);
    }
    .grid { display: grid; gap: var(--space-4); }
    .grid.kpis { grid-template-columns: repeat(5, minmax(0,1fr)); }
    .grid.split { grid-template-columns: 1.25fr .95fr; align-items: start; }
    .grid.cards-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }

    .card {
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--surface) 92%, white 8%),
        var(--surface)
      );
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: var(--space-4);
      min-width: 0;
    }
    .card h2, .card h3 { margin: 0 0 8px; font-size: 1rem; }
    .subtle { color: var(--muted); }

    .kpi-value {
      font-size: clamp(1.4rem, 1rem + 1.3vw, 2rem);
      font-weight: 800;
      margin: 10px 0 4px;
    }
    .kpi-foot { color: var(--muted); font-size: 13px; }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .accounts-list, .alerts-list, .timeline, .list {
      display: grid;
      gap: 10px;
    }
    .account-row, .alert-row, .tx-row, .timeline-row {
      display: grid;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: color-mix(in srgb, var(--surface-2) 78%, transparent);
      padding: 12px;
    }
    .account-row { grid-template-columns: 1fr auto auto; }
    .tx-row { grid-template-columns: 1.3fr .8fr .8fr .7fr auto; }
    .timeline-row { grid-template-columns: 1.1fr .8fr .8fr .6fr; }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: var(--surface-3);
    }

    .income { color: var(--income); }
    .expense { color: var(--expense); }
    .warning { color: var(--warning); }
    .danger { color: var(--danger); }
    .muted { color: var(--muted); }

    .progress {
      height: 10px;
      background: var(--surface-3);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--info));
      border-radius: inherit;
    }

    .chart {
      height: 280px;
      display: flex;
      align-items: end;
      gap: 8px;
      padding-top: 18px;
    }
    .bar {
      flex: 1;
      border-radius: 10px 10px 4px 4px;
      min-height: 12px;
      position: relative;
    }
    .bar.income {
      background: color-mix(in srgb, var(--income) 74%, #ffffff 6%);
    }
    .bar.expense {
      background: color-mix(in srgb, var(--expense) 78%, #ffffff 5%);
    }
    .bar-label {
      position: absolute;
      bottom: -24px;
      width: 100%;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
    }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 13px; color: var(--muted); }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 12px;
      padding: 12px;
    }
    .field textarea { min-height: 90px; resize: vertical; }
    .span-2 { grid-column: span 2; }

    .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .tab {
      padding: 10px 12px;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      cursor: pointer;
      color: var(--muted);
    }
    .tab.active {
      background: var(--primary);
      color: #062221;
      border-color: transparent;
    }

    .fab {
      position: fixed;
      right: 18px;
      bottom: 84px;
      width: 58px;
      height: 58px;
      border-radius: 999px;
      border: 0;
      background: var(--primary);
      color: #041615;
      font-size: 28px;
      box-shadow: var(--shadow);
      z-index: 10;
    }

    .mobile-nav { display: none; }
    .hidden { display: none !important; }

    dialog {
      width: min(760px, calc(100vw - 24px));
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 24px;
      padding: 0;
      box-shadow: var(--shadow);
    }
    dialog::backdrop {
      background: rgba(2, 8, 23, .6);
      backdrop-filter: blur(3px);
    }
    .modal-head, .modal-body, .modal-foot { padding: 18px; }
    .modal-head {
      border-bottom: 1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center;
    }
    .modal-foot {
      border-top: 1px solid var(--border);
      display:flex; justify-content:flex-end; gap: 10px;
    }

    .empty {
      display:grid;
      gap: 10px;
      place-items:center;
      min-height: 180px;
      color: var(--muted);
      text-align:center;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    @media (max-width: 1100px) {
      .grid.kpis { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .grid.split, .grid.cards-3 { grid-template-columns: 1fr; }
      .tx-row, .timeline-row, .account-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 780px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .content { padding: 16px 16px 92px; }
      .mobile-nav {
        position: fixed;
        left: 0; right: 0; bottom: 0; z-index: 12;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
        padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
        background: color-mix(in srgb, var(--surface) 88%, transparent);
        backdrop-filter: blur(14px);
        border-top: 1px solid var(--border);
      }
      .mobile-nav button {
        min-height: 52px;
        border-radius: 14px;
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
      }
      .mobile-nav button.active {
        background: var(--surface-3);
        color: var(--text);
        border-color: var(--border);
      }
      .fab { bottom: 96px; }
      .form-grid { grid-template-columns: 1fr; }
      .span-2 { grid-column: span 1; }
      .topbar { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Navegación principal">
      <div class="brand">
        <svg viewBox="0 0 64 64" fill="none" aria-label="Nexo Finanzas logo">
          <rect x="10" y="10" width="44" height="44" rx="14" stroke="currentColor" stroke-width="4"></rect>
          <path d="M18 42V22l12 12 16-16v24"
                stroke="currentColor" stroke-width="5"
                stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        <span>Nexo<br>Finanzas</span>
      </div>
      <nav class="nav" id="sidebarNav"></nav>
      <button class="theme-btn" id="themeToggle" aria-label="Cambiar tema">◐</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="screenTitle">Inicio</h1>
          <div class="subtle">Control total del dinero, deuda y flujo real</div>
        </div>
        <div class="topbar-actions">
          <span class="pill" id="connectionState">Conectado</span>
          <button class="btn ghost" id="seedBtn">Cargar ejemplo</button>
          <button class="btn ghost" id="exportBtn">Exportar JSON</button>
          <button class="btn primary" id="newMovementBtn">+ Nuevo movimiento</button>
        </div>
      </header>
      <div class="content" id="appContent"></div>
    </main>
  </div>

  <nav class="mobile-nav" id="mobileNav" aria-label="Navegación móvil"></nav>
  <button class="fab" id="fabBtn" aria-label="Nuevo movimiento">+</button>

  <dialog id="movementDialog">
    <form method="dialog" id="movementForm">
      <div class="modal-head">
        <div>
          <strong>Registrar movimiento</strong>
          <div class="subtle">Ingreso, gasto, transferencia, tarjeta, ajuste o pago</div>
        </div>
        <button class="btn ghost" value="cancel">Cerrar</button>
      </div>
      <div class="modal-body">
        <div class="tabs" id="movementTypeTabs"></div>
        <div class="form-grid" style="margin-top:16px;">
          <div class="field">
            <label for="amount">Monto</label>
            <input id="amount" name="amount" type="number" min="0" step="0.01" required />
          </div>
          <div class="field">
            <label for="effectiveAt">Fecha efectiva</label>
            <input id="effectiveAt" name="effectiveAt" type="date" required />
          </div>
          <div class="field">
            <label for="sourceAccountId">Cuenta origen</label>
            <select id="sourceAccountId" name="sourceAccountId"></select>
          </div>
          <div class="field">
            <label for="destinationAccountId">Cuenta destino</label>
            <select id="destinationAccountId" name="destinationAccountId"></select>
          </div>
          <div class="field">
            <label for="category">Categoría</label>
            <select id="category" name="category"></select>
          </div>
          <div class="field">
            <label for="status">Estado</label>
            <select id="status" name="status">
              <option value="paid">Pagado</option>
              <option value="pending">Pendiente</option>
              <option value="scheduled">Programado</option>
            </select>
          </div>
          <div class="field span-2">
            <label for="description">Descripción</label>
            <textarea id="description" name="description" placeholder="Ej: supermercado, sueldo, cuota notebook"></textarea>
          </div>
          <div class="field">
            <label for="installments">Cuotas</label>
            <input id="installments" name="installments" type="number" min="1" step="1" value="1" />
          </div>
          <div class="field">
            <label for="frequency">Recurrencia</label>
            <select id="frequency" name="frequency">
              <option value="none">Sin recurrencia</option>
              <option value="weekly">Semanal</option>
              <option value="monthly">Mensual</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn ghost" value="cancel">Cancelar</button>
        <button class="btn primary" id="saveMovementBtn" value="default">Guardar</button>
      </div>
    </form>
  </dialog>

  <script>
    const STORAGE_KEY = 'nexo-finanzas-v1';
    const todayISO = () => new Date().toISOString().slice(0,10);
    const uid = () =>
      Math.random().toString(36).slice(2,10) +
      Date.now().toString(36).slice(-4);
    const currency = (n, code='CLP') =>
      new Intl.NumberFormat('es-CL', {
        style:'currency', currency: code, maximumFractionDigits: 0
      }).format(Number(n || 0));

    const NAV = [
      { id:'dashboard',   label:'Inicio',    icon:'⌂' },
      { id:'movements',   label:'Mov.',      icon:'↹' },
      { id:'accounts',    label:'Cuentas',   icon:'◫' },
      { id:'installments',label:'Cuotas',    icon:'▤' },
      { id:'scheduled',   label:'Prog.',     icon:'◷' },
      { id:'reports',     label:'Reportes',  icon:'◫' },
      { id:'settings',    label:'Ajustes',   icon:'⚙' },
    ];

    const ACCOUNT_TYPES = [
      ['debit','Cuenta débito'],
      ['vista','Cuenta vista'],
      ['checking','Cuenta corriente'],
      ['cash','Efectivo'],
      ['credit','Tarjeta de crédito'],
      ['savings','Ahorro'],
      ['custom','Personalizada']
    ];

    let state = loadState();
    let currentScreen = 'dashboard';
    let currentMovementKind = 'expense';

    function defaultState() {
      return {
        theme: matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark',
        accounts: [],
        transactions: [],
        installmentPlans: [],
        installments: [],
        recurringRules: [],
        alerts: [],
        auditLog: [],
        categories: [
          'Alimentación','Transporte','Hogar','Salud','Educación',
          'Suscripciones','Ocio','Ingresos','Deudas','Transferencias',
          'Ahorro','Inversión','Otros'
        ]
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : defaultState();
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function resetApp() {
      if (!confirm('Esto borrará todos tus datos locales de Nexo Finanzas. ¿Quieres continuar?')) {
        return;
      }
      state = defaultState();
      saveState();
      render();
    }

    function logAudit(action, entityType, entityId, before, after) {
      state.auditLog.unshift({
        id: uid(),
        action,
        entityType,
        entityId,
        before,
        after,
        createdAt: new Date().toISOString()
      });
    }

    function monthOffset(offset) {
      const d = new Date();
      d.setMonth(d.getMonth()+offset);
      return d.toISOString().slice(0,7);
    }
    function monthDate(day) {
      const d = new Date();
      d.setDate(day);
      return d.toISOString().slice(0,10);
    }

    function seededData() {
      const debit = {
        id: uid(), name:'Banco Chile Débito', type:'debit',
        initialBalance:420000, currentBalance:420000,
        currency:'CLP', color:'#14b8a6', status:'active'
      };
      const cash = {
        id: uid(), name:'Efectivo', type:'cash',
        initialBalance:65000, currentBalance:65000,
        currency:'CLP', color:'#22c55e', status:'active'
      };
      const credit = {
        id: uid(), name:'Visa Falabella', type:'credit',
        initialBalance:0, currentBalance:0,
        currency:'CLP', color:'#f59e0b', status:'active',
        creditLimit:1500000, billingDay:25, dueDay:5
      };
      const savings = {
        id: uid(), name:'Fondo ahorro', type:'savings',
        initialBalance:900000, currentBalance:900000,
        currency:'CLP', color:'#38bdf8', status:'active'
      };
      const accounts = [debit, cash, credit, savings];

      const txs = [
        {
          id: uid(), kind:'income', amount:980000, currency:'CLP',
          effectiveAt:todayISO(), recordedAt:new Date().toISOString(),
          destinationAccountId:debit.id,
          category:'Ingresos', status:'paid',
          description:'Pago proyecto', origin:'manual'
        },
        {
          id: uid(), kind:'expense', amount:18500, currency:'CLP',
          effectiveAt:todayISO(), recordedAt:new Date().toISOString(),
          sourceAccountId:debit.id,
          category:'Alimentación', status:'paid',
          description:'Colación y supermercado', origin:'manual'
        },
        {
          id: uid(), kind:'transfer', amount:120000, currency:'CLP',
          effectiveAt:todayISO(), recordedAt:new Date().toISOString(),
          sourceAccountId:debit.id, destinationAccountId:savings.id,
          category:'Ahorro', status:'paid',
          description:'Separación de ahorro', origin:'manual'
        },
        {
          id: uid(), kind:'expense', amount:22000, currency:'CLP',
          effectiveAt:todayISO(), recordedAt:new Date().toISOString(),
          sourceAccountId:cash.id,
          category:'Transporte', status:'paid',
          description:'Combustible', origin:'manual'
        },
      ];

      const planId = uid();
      const purchase = {
        id: uid(), kind:'card_purchase', amount:360000, currency:'CLP',
        effectiveAt:todayISO(), recordedAt:new Date().toISOString(),
        sourceAccountId:credit.id,
        category:'Educación', status:'paid',
        description:'Curso + dominio',
        installmentPlanId: planId,
        origin:'manual'
      };
      txs.push(purchase);

      const installmentPlans = [{
        id: planId,
        accountId: credit.id,
        merchant:'Curso + dominio',
        totalAmount:360000,
        totalInstallments:6,
        firstChargeDate: todayISO(),
        billingCycleAnchor:25,
        status:'active'
      }];

      const installments = Array.from({length:6}, (_,i)=>({
        id: uid(), planId, accountId: credit.id,
        number: i+1, amount: 60000,
        dueMonth: monthOffset(i),
        statementMonth: monthOffset(i),
        status: i===0 ? 'billed' : 'pending'
      }));

      const recurringRules = [
        {
          id: uid(), label:'Arriendo', type:'expense', amount:280000,
          frequency:'monthly', interval:1,
          nextOccurrenceAt: monthDate(3),
          accountId:debit.id, category:'Hogar',
          autoGenerate:true, status:'active'
        },
        {
          id: uid(), label:'Internet', type:'expense', amount:18990,
          frequency:'monthly', interval:1,
          nextOccurrenceAt: monthDate(8),
          accountId:debit.id, category:'Hogar',
          autoGenerate:true, status:'active'
        },
        {
          id: uid(), label:'Gimnasio', type:'expense', amount:24990,
          frequency:'monthly', interval:1,
          nextOccurrenceAt: monthDate(12),
          accountId:debit.id, category:'Salud',
          autoGenerate:true, status:'active'
        },
      ];

      return {
        ...defaultState(),
        accounts,
        transactions: txs,
        installmentPlans,
        installments,
        recurringRules,
        alerts: [],
        auditLog: [],
      };
    }

    function recalculate() {
      state.accounts.forEach(a => a.currentBalance = Number(a.initialBalance || 0));
      for (const tx of state.transactions.filter(t => t.status !== 'cancelled')) {
        const src = state.accounts.find(a => a.id === tx.sourceAccountId);
        const dst = state.accounts.find(a => a.id === tx.destinationAccountId);
        switch (tx.kind) {
          case 'income':
            if (dst) dst.currentBalance += Number(tx.amount);
            break;
          case 'expense':
            if (src) src.currentBalance -= Number(tx.amount);
            break;
          case 'transfer':
            if (src) src.currentBalance -= Number(tx.amount);
            if (dst) dst.currentBalance += Number(tx.amount);
            break;
          case 'card_payment':
            if (src) src.currentBalance -= Number(tx.amount);
            break;
          case 'balance_adjustment':
            if (dst) dst.currentBalance += Number(tx.amount);
            if (src) src.currentBalance -= Number(tx.amount);
            break;
          case 'card_purchase':
            // impacta cupo, no saldo inmediato
            break;
        }
      }
      state.alerts = buildAlerts();
      saveState();
    }

    function cardMetrics(accountId) {
      const card = state.accounts.find(a => a.id === accountId);
      const purchases = state.transactions
        .filter(t => t.kind === 'card_purchase' &&
                     t.sourceAccountId === accountId &&
                     t.status !== 'cancelled')
        .reduce((s,t)=>s+Number(t.amount),0);

      const payments = state.transactions
        .filter(t => t.kind === 'card_payment' &&
                     t.destinationAccountId === accountId &&
                     t.status !== 'cancelled')
        .reduce((s,t)=>s+Number(t.amount),0);

      const totalDebt = state.installments
        .filter(i => i.accountId === accountId &&
                     !['paid','cancelled'].includes(i.status))
        .reduce((s,i)=>s+Number(i.amount),0);

      const billedDebt = state.installments
        .filter(i => i.accountId === accountId && i.status === 'billed')
        .reduce((s,i)=>s+Number(i.amount),0);

      const futureDebt = state.installments
        .filter(i => i.accountId === accountId && i.status === 'pending')
        .reduce((s,i)=>s+Number(i.amount),0);

      const usedLimit = Math.max(purchases - payments, 0);
      const limit = Number(card.creditLimit || 0);

      return {
        limit,
        usedLimit,
        availableLimit: Math.max(limit - usedLimit, 0),
        totalDebt,
        billedDebt,
        futureDebt,
        usagePct: limit ? (usedLimit / limit) * 100 : 0
      };
    }

    function upcomingCommitments() {
      const today = new Date();
      const limit = new Date();
      limit.setDate(limit.getDate()+7);

      const recurring = state.recurringRules
        .filter(r => r.status === 'active')
        .filter(r => {
          const d = new Date(r.nextOccurrenceAt);
          return d >= today && d <= limit;
        })
        .map(r => ({
          label:r.label,
          amount:r.amount,
          date:r.nextOccurrenceAt,
          type:'programado'
        }));

      const monthKey = limit.toISOString().slice(0,7);
      const installments = state.installments
        .filter(i => i.status !== 'paid' && i.dueMonth <= monthKey)
        .map(i => ({
          label:`Cuota ${i.number}/${state.installmentPlans.find(p=>p.id===i.planId)?.totalInstallments || '?'}`,
          amount:i.amount,
          date:i.dueMonth+'-01',
          type:'cuota'
        }));

      const items = [...recurring, ...installments]
        .sort((a,b)=>String(a.date).localeCompare(String(b.date)));

      return {
        items,
        total: items.reduce((s,i)=>s+Number(i.amount),0)
      };
    }

    function overdueCommitments() {
      const today = todayISO();
      const items = state.recurringRules
        .filter(r => r.status==='active' && r.nextOccurrenceAt < today)
        .map(r => ({
          label:r.label,
          amount:r.amount,
          date:r.nextOccurrenceAt,
          type:'programado'
        }));
      return {
        items,
        total: items.reduce((s,i)=>s+Number(i.amount),0)
      };
    }

    function getMetrics() {
      const liquidTypes = ['debit','vista','checking','cash'];
      const liquid = state.accounts
        .filter(a => liquidTypes.includes(a.type) && a.status === 'active')
        .reduce((s,a)=>s+Number(a.currentBalance),0);

      const savings = state.accounts
        .filter(a => a.type === 'savings' && a.status === 'active')
        .reduce((s,a)=>s+Number(a.currentBalance),0);

      const today = todayISO();
      const month = today.slice(0,7);

      const incomeToday = state.transactions
        .filter(t => t.kind === 'income' &&
                     t.effectiveAt === today &&
                     t.status === 'paid')
        .reduce((s,t)=>s+Number(t.amount),0);

      const expenseToday = state.transactions
        .filter(t => t.kind === 'expense' &&
                     t.effectiveAt === today &&
                     t.status === 'paid')
        .reduce((s,t)=>s+Number(t.amount),0);

      const incomeMonth = state.transactions
        .filter(t => t.kind === 'income' &&
                     t.effectiveAt.startsWith(month) &&
                     t.status === 'paid')
        .reduce((s,t)=>s+Number(t.amount),0);

      const expenseMonth = state.transactions
        .filter(t => t.kind === 'expense' &&
                     t.effectiveAt.startsWith(month) &&
                     t.status === 'paid')
        .reduce((s,t)=>s+Number(t.amount),0);

      const upcoming = upcomingCommitments();
      const overdue = overdueCommitments();
      const cards = state.accounts
        .filter(a => a.type === 'credit')
        .map(a => ({ account:a, ...cardMetrics(a.id) }));

      const cardDebt = cards.reduce((s,c)=>s+c.totalDebt,0);

      const availableReal = liquid - upcoming.total - overdue.total;
      const grossBalance = liquid + savings;

      return {
        liquid,
        savings,
        incomeToday,
        expenseToday,
        incomeMonth,
        expenseMonth,
        grossBalance,
        upcoming,
        overdue,
        cards,
        cardDebt,
        availableReal,
        netMonth: incomeMonth - expenseMonth
      };
    }

    function buildAlerts() {
      const metrics = getMetrics();
      const alerts = [];

      if (metrics.availableReal < 0) {
        alerts.push({
          level:'danger',
          text:'Tu disponible real está negativo considerando próximos compromisos.'
        });
      }
      if (metrics.overdue.total > 0) {
        alerts.push({
          level:'warning',
          text:`Tienes ${metrics.overdue.items.length} compromisos vencidos.`
        });
      }
      metrics.cards.forEach(card => {
        if (card.usagePct >= 80) {
          alerts.push({
            level:'warning',
            text:`La tarjeta ${card.account.name} usa ${card.usagePct.toFixed(0)}% del cupo.`
          });
        }
      });
      state.accounts
        .filter(a => ['debit','vista','checking','cash'].includes(a.type) && a.currentBalance < 50000)
        .forEach(a => {
          alerts.push({
            level:'warning',
            text:`Saldo bajo en ${a.name}.`
          });
        });

      return alerts;
    }

    function computeMonthlyBars() {
      const months = [];
      const now = new Date();
      for (let i=5; i>=0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
        const key = d.toISOString().slice(0,7);
        const short = d.toLocaleDateString('es-CL', { month:'short' });
        const incomes = state.transactions
          .filter(t=>t.kind==='income' &&
                     t.effectiveAt.startsWith(key) &&
                     t.status==='paid')
          .reduce((s,t)=>s+Number(t.amount),0);
        const expenses = state.transactions
          .filter(t=>t.kind==='expense' &&
                     t.effectiveAt.startsWith(key) &&
                     t.status==='paid')
          .reduce((s,t)=>s+Number(t.amount),0);

        months.push({ label: short, value: incomes, type:'income' });
        months.push({ label: short, value: expenses, type:'expense' });
      }
      const max = Math.max(...months.map(m=>m.value), 1);
      return months.map(m => ({
        ...m,
        height: Math.max((m.value/max)*100, 8)
      }));
    }

    function syncMovementFormByKind() {
      installments.parentElement.classList
        .toggle('hidden', currentMovementKind !== 'card_purchase');
      frequency.parentElement.classList
        .toggle('hidden', !['expense','income'].includes(currentMovementKind));

      if (currentMovementKind === 'income') {
        sourceAccountId.value = '';
      }
      if (currentMovementKind === 'expense') {
        destinationAccountId.value = '';
      }
    }

    function bindScreenActions() {
      // Diálogos de movimiento
      document.querySelectorAll('[data-open-dialog]')
        .forEach(btn => btn.onclick = openMovementDialog);

      // Eliminar cuentas
      document.querySelectorAll('[data-delete-account]').forEach(btn => {
        btn.onclick = () => deleteAccount(btn.dataset.deleteAccount);
      });

      // Reset app
      const resetBtn = document.getElementById('resetAppBtn');
      if (resetBtn) {
        resetBtn.onclick = resetApp;
      }

      // Categorías
      const addCat = document.getElementById('addCategoryBtn');
      if (addCat) {
        addCat.onclick = addCategory;
      }

      document.querySelectorAll('[data-save-category]').forEach(btn => {
        btn.onclick = () => updateCategory(btn.dataset.saveCategory);
      });

      document.querySelectorAll('[data-delete-category]').forEach(btn => {
        btn.onclick = () => deleteCategory(btn.dataset.deleteCategory);
      });
    }

    function openMovementDialog() {
      populateMovementForm();
      movementDialog.showModal();
    }

    function addTransactionFromForm(ev) {
      ev.preventDefault();
      const amount = Number(document.getElementById('amount').value || 0);
      if (!amount || amount <= 0) return;

      const tx = {
        id: uid(),
        kind: currentMovementKind,
        amount,
        currency:'CLP',
        effectiveAt: document.getElementById('effectiveAt').value,
        recordedAt: new Date().toISOString(),
        sourceAccountId: sourceAccountId.value || undefined,
        destinationAccountId: destinationAccountId.value || undefined,
        category: category.value,
        status: status.value,
        description: description.value.trim(),
        origin:'manual'
      };

      if (currentMovementKind === 'transfer' &&
          (!tx.sourceAccountId ||
           !tx.destinationAccountId ||
           tx.sourceAccountId === tx.destinationAccountId)) {
        alert('La transferencia requiere origen y destino distintos.');
        return;
      }
      if (['expense','card_purchase','card_payment'].includes(currentMovementKind) &&
          !tx.sourceAccountId) {
        alert('Debes seleccionar una cuenta origen.');
        return;
      }
      if (['income'].includes(currentMovementKind) &&
          !tx.destinationAccountId) {
        alert('Debes seleccionar una cuenta destino.');
        return;
      }

      state.transactions.unshift(tx);
      logAudit('create','transaction',tx.id,null,tx);

      if (currentMovementKind === 'card_purchase' &&
          Number(installments.value || 1) > 1) {
        const totalInstallments = Number(installments.value || 1);
        const planId = uid();
        tx.installmentPlanId = planId;

        const plan = {
          id: planId,
          accountId: tx.sourceAccountId,
          merchant: tx.description || 'Compra en cuotas',
          totalAmount: tx.amount,
          totalInstallments,
          firstChargeDate: tx.effectiveAt,
          billingCycleAnchor: state.accounts.find(a => a.id === tx.sourceAccountId)?.billingDay || 1,
          status:'active'
        };
        state.installmentPlans.unshift(plan);

        const base = Math.floor(tx.amount / totalInstallments);
        const rem = tx.amount - (base * totalInstallments);

        for (let i=0;i<totalInstallments;i++) {
          const amountInstallment = i === totalInstallments -1 ? base + rem : base;
          state.installments.push({
            id: uid(), planId, accountId: tx.sourceAccountId,
            number: i+1, amount: amountInstallment,
            dueMonth: monthOffset(i),
            statementMonth: monthOffset(i),
            status: i===0 ? 'billed' : 'pending'
          });
        }
      }

      if (frequency.value !== 'none' &&
          ['income','expense'].includes(currentMovementKind)) {
        const rule = {
          id: uid(),
          label: tx.description || tx.category,
          type: currentMovementKind,
          amount: tx.amount,
          frequency: frequency.value,
          interval:1,
          nextOccurrenceAt: tx.effectiveAt,
          accountId: tx.sourceAccountId || tx.destinationAccountId,
          category: tx.category,
          autoGenerate:true,
          status:'active'
        };
        state.recurringRules.unshift(rule);
        logAudit('create','recurringRule',rule.id,null,rule);
      }

      movementDialog.close();
      movementForm.reset();
      render();
    }

    function deleteAccount(accountId) {
      const account = state.accounts.find(a => a.id === accountId);
      if (!account) return;

      const hasTx = state.transactions.some(
        t => t.sourceAccountId === accountId || t.destinationAccountId === accountId
      );
      const hasInstallments = state.installments.some(i => i.accountId === accountId);
      const hasRecurring = state.recurringRules.some(r => r.accountId === accountId);

      if (hasTx || hasInstallments || hasRecurring) {
        alert('No puedes eliminar una cuenta con movimientos, cuotas o programaciones asociadas. Desactívala en su lugar.');
        return;
      }

      if (!confirm(`Eliminar la cuenta "${account.name}" de forma permanente?`)) {
        return;
      }

      const before = { ...account };
      state.accounts = state.accounts.filter(a => a.id !== accountId);
      logAudit('delete', 'account', accountId, before, null);
      saveState();
      render();
    }

    function addCategory() {
      const input = document.getElementById('newCategory');
      const name = (input?.value || '').trim();
      if (!name) return;

      if (state.categories.includes(name)) {
        alert('Ya existe una categoría con ese nombre.');
        return;
      }

      state.categories.push(name);
      logAudit('create', 'category', name, null, { name });
      saveState();
      render();
    }

    function updateCategory(oldName) {
      const input = document.querySelector(`input[data-category-name="${oldName}"]`);
      if (!input) return;

      const newName = input.value.trim();
      if (!newName || newName === oldName) return;

      if (state.categories.includes(newName)) {
        alert('Ya existe otra categoría con ese nombre.');
        return;
      }

      state.transactions.forEach(tx => {
        if (tx.category === oldName) tx.category = newName;
      });

      const index = state.categories.indexOf(oldName);
      if (index !== -1) state.categories[index] = newName;

      logAudit('update', 'category', oldName, { name: oldName }, { name: newName });
      saveState();
      render();
    }

    function deleteCategory(name) {
      const used = state.transactions.some(tx => tx.category === name);
      if (used) {
        alert('No puedes eliminar una categoría que tiene movimientos. Cambia primero la categoría de esos movimientos.');
        return;
      }

      if (!confirm(`Eliminar la categoría "${name}"?`)) return;

      state.categories = state.categories.filter(c => c !== name);
      logAudit('delete', 'category', name, { name }, null);
      saveState();
      render();
    }

    function exportJSON() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `nexo-finanzas-backup-${todayISO()}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function setThemeToggle() {
      document.documentElement.setAttribute('data-theme', state.theme || 'dark');
      themeToggle.onclick = () => {
        state.theme = state.theme === 'dark' ? 'light' : 'dark';
        saveState();
        render();
      };
    }

    async function registerSW() {
      if ('serviceWorker' in navigator) {
        try { await navigator.serviceWorker.register('./service-worker.js'); } catch {}
      }
    }

    function render() {
      recalculate();
      document.documentElement.setAttribute('data-theme', state.theme || 'dark');
      screenTitle.textContent = NAV.find(n=>n.id===currentScreen)?.label || 'Inicio';
      connectionState.textContent = navigator.onLine ? 'Conectado' : 'Offline';
      connectionState.className = 'pill ' + (navigator.onLine ? 'status-online' : 'status-offline');

      renderNav();
      populateMovementForm();

      const renderers = {
        dashboard: renderDashboard,
        movements: renderMovements,
        accounts: renderAccounts,
        installments: renderInstallments,
        scheduled: renderScheduled,
        reports: renderReports,
        settings: renderSettings,
      };
      appContent.innerHTML = renderers[currentScreen]();
      bindScreenActions();
    }

    seedBtn.onclick = () => {
      state = seededData();
      saveState();
      render();
    };
    exportBtn.onclick = exportJSON;
    newMovementBtn.onclick = openMovementDialog;
    fabBtn.onclick = openMovementDialog;
    movementForm.addEventListener('submit', addTransactionFromForm);
    window.addEventListener('online', render);
    window.addEventListener('offline', render);
    setThemeToggle();
    registerSW();
    render();
  </script>
</body>
</html>
