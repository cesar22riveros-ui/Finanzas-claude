/* ============================================================
   VIEWS — Renderizado de cada pantalla (funciones puras: state -> html)
   ============================================================ */
const Views = (() => {
  const { icon, fmtDateHuman, daysUntil } = UI;
  const fmt = Calc.fmt;

  function typeMeta(m) {
    if (m.type === 'income') return { ic: 'up', cls: 'pos', sign: '+' };
    if (m.type === 'transfer') return { ic: 'swap', cls: '', sign: '' };
    if (m.type === 'card_payment') return { ic: 'card', cls: '', sign: '' };
    if (m.type === 'adjustment') return { ic: 'edit', cls: '', sign: '' };
    return { ic: 'down', cls: 'neg', sign: '−' };
  }

  function movementRow(state, m) {
    const acc = state.accounts.find(a => a.id === m.accountId);
    const cat = state.categories.find(c => c.id === m.categoryId);
    const meta = typeMeta(m);
    const statusBadge = m.status === 'scheduled'
      ? `<span class="badge scheduled">Programado</span>`
      : '';
    return `<div class="ledger-row" data-mov="${m.id}">
      <div class="row-dot" style="background:${acc ? acc.color : '#999'}"></div>
      <div class="row-body">
        <div class="row-title">${m.description || (cat ? cat.name : typeLabel(m.type))}</div>
        <div class="row-sub">${fmtDateHuman(m.date)} · ${acc ? acc.name : ''}${cat ? ' · ' + cat.name : ''} ${statusBadge}</div>
      </div>
      <div class="row-amount ${meta.cls}">${meta.sign}${fmt(m.amount, acc ? acc.currency : 'CLP')}</div>
    </div>`;
  }

  function typeLabel(t) {
    return { income: 'Ingreso', expense: 'Gasto', transfer: 'Transferencia', card_payment: 'Pago tarjeta', adjustment: 'Ajuste' }[t] || t;
  }

  /* ---------------- DASHBOARD ---------------- */
  function dashboard(state) {
    const total = Calc.balanceTotal(state);
    const disp = Calc.disponibleReal(state);
    const { ingresos, gastos } = Calc.todayFlows(state);
    const mes = Calc.monthFlows(state);
    const cash = Calc.cashAccounts(state);
    const cards = Calc.creditAccounts(state);
    const proximos = Calc.proximosVencimientos(state, 14).slice(0, 5);
    const alerts = Calc.alerts(state);
    const last = Calc.lastMovements(state, 6);

    return `
    <div class="grid-2" style="margin-bottom:12px;">
      <div class="stub" style="--bar:var(--accent)">
        <div class="label">Balance total</div>
        <div class="amount num">${fmt(total)}</div>
        <div class="sub">Suma de cuentas de efectivo, débito y ahorro</div>
      </div>
      <div class="stub" style="--bar:${disp >= 0 ? 'var(--income)' : 'var(--expense)'}">
        <div class="label">Disponible real</div>
        <div class="amount num ${disp < 0 ? 'neg' : ''}">${fmt(disp)}</div>
        <div class="sub">Descontando cuotas y pagos próximos a 7 días</div>
      </div>
    </div>

    ${alerts.length ? `<div>${alerts.slice(0, 3).map(a => `<div class="alert-banner ${a.level === 'danger' ? 'danger' : ''}"><strong>${a.level === 'danger' ? '⚠ Atención' : 'Aviso'}</strong>${a.text}</div>`).join('')}</div>` : ''}

    <div class="grid-3" style="margin-bottom:8px;">
      <div class="card"><div class="label" style="font-size:11.5px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;">Ingresos hoy</div><div class="num" style="font-size:18px;font-weight:600;color:var(--income);margin-top:4px;">${fmt(ingresos)}</div></div>
      <div class="card"><div class="label" style="font-size:11.5px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;">Gastos hoy</div><div class="num" style="font-size:18px;font-weight:600;color:var(--expense);margin-top:4px;">${fmt(gastos)}</div></div>
      <div class="card"><div class="label" style="font-size:11.5px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;">Flujo neto del mes</div><div class="num" style="font-size:18px;font-weight:600;color:${mes.neto >= 0 ? 'var(--income)' : 'var(--expense)'};margin-top:4px;">${fmt(mes.neto)}</div></div>
    </div>

    <div class="section-title">Cuentas</div>
    <div class="grid-2">
      ${cash.map(a => `
        <div class="stub" style="--bar:${a.color}">
          <div class="label">${a.name}</div>
          <div class="amount num" style="font-size:19px;">${fmt(a.currentBalance, a.currency)}</div>
        </div>`).join('')}
    </div>

    ${cards.length ? `<div class="section-title">Tarjetas de crédito</div>` : ''}
    ${cards.map(a => `
      <div class="card" style="margin-bottom:10px;">
        <div class="card-head" style="margin-bottom:8px;"><h3 style="text-transform:none;color:var(--ink);font-size:14.5px;">${a.name}</h3><span class="text-soft">${Calc.pctUsado(a)}% usado</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${Calc.pctUsado(a)}%;background:${Calc.pctUsado(a) >= 85 ? 'var(--expense)' : 'var(--accent)'}"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12.5px;color:var(--ink-soft);">
          <span>Usado: <b class="num" style="color:var(--ink)">${fmt(a.usedCredit || 0)}</b></span>
          <span>Disponible: <b class="num" style="color:var(--ink)">${fmt(Calc.cupoDisponible(a))}</b></span>
        </div>
      </div>`).join('')}

    <div class="section-title">Próximos vencimientos</div>
    <div class="card">
      ${proximos.length ? proximos.map(v => `
        <div class="ledger-row">
          <div class="row-dot" style="background:${daysUntil(v.date) <= 2 ? 'var(--expense)' : 'var(--pending)'}"></div>
          <div class="row-body"><div class="row-title">${v.name}</div><div class="row-sub">${fmtDateHuman(v.date)} · ${daysUntil(v.date) === 0 ? 'hoy' : daysUntil(v.date) + ' días'}</div></div>
          <div class="row-amount pending num">${fmt(v.amount)}</div>
        </div>`).join('') : emptyState('calendar', 'Sin vencimientos próximos', 'Los gastos programados y cuotas por vencer aparecerán aquí.')}
    </div>

    <div class="section-title">Últimos movimientos</div>
    <div class="card">
      ${last.length ? last.map(m => movementRow(state, m)).join('') : emptyState('list', 'Aún no hay movimientos', 'Registra tu primer ingreso o gasto con el botón +.')}
    </div>
    `;
  }

  function emptyState(ic, title, sub) {
    return `<div class="empty-state"><div class="ic">${icon(ic)}</div><div style="font-weight:600;font-size:13.5px;">${title}</div><p>${sub}</p></div>`;
  }

  /* ---------------- MOVIMIENTOS ---------------- */
  function movementsView(state, filter = {}) {
    let list = [...state.movements].sort((a, b) => (b.date + b.id).localeCompare(a.date + a.id));
    if (filter.type) list = list.filter(m => m.type === filter.type);
    if (filter.accountId) list = list.filter(m => m.accountId === filter.accountId || m.toAccountId === filter.accountId);
    if (filter.q) {
      const q = filter.q.toLowerCase();
      list = list.filter(m => (m.description || '').toLowerCase().includes(q));
    }
    const chips = [
      { key: '', label: 'Todos' }, { key: 'income', label: 'Ingresos' }, { key: 'expense', label: 'Gastos' },
      { key: 'transfer', label: 'Transferencias' }, { key: 'card_payment', label: 'Pagos tarjeta' }
    ];
    const grouped = {};
    list.forEach(m => { (grouped[m.date] = grouped[m.date] || []).push(m); });

    return `
    <div class="field" style="margin-bottom:10px;">
      <input id="movSearch" type="text" placeholder="Buscar movimientos…" value="${filter.q || ''}">
    </div>
    <div class="chip-row" id="movChips">
      ${chips.map(c => `<button class="chip ${filter.type === c.key || (!filter.type && !c.key) ? 'active' : ''}" data-type="${c.key}">${c.label}</button>`).join('')}
    </div>
    ${Object.keys(grouped).length ? Object.keys(grouped).sort().reverse().map(date => `
      <div class="section-title" style="margin:20px 0 8px;font-size:12.5px;color:var(--ink-soft);text-transform:uppercase;">${fmtDateHuman(date)}</div>
      <div class="card">${grouped[date].map(m => movementRow(state, m)).join('')}</div>
    `).join('') : emptyState('list', 'Sin resultados', 'Prueba con otro filtro o registra un nuevo movimiento.')}
    `;
  }

  /* ---------------- CUENTAS ---------------- */
  function accountsView(state) {
    const active = state.accounts.filter(a => a.active);
    const inactive = state.accounts.filter(a => !a.active);
    return `
    <div class="grid-2">
      ${active.map(a => `
      <div class="stub" data-acc="${a.id}" style="--bar:${a.color};cursor:pointer;">
        <div class="label">${typeName(a.type)}</div>
        <div class="amount num" style="font-size:20px;">${fmt(a.currentBalance, a.currency)}</div>
        <div class="sub">${a.name}</div>
        ${a.type === 'credito' ? `<div class="sub">Cupo disponible: <b class="num">${fmt(Calc.cupoDisponible(a))}</b></div>` : ''}
      </div>`).join('')}
    </div>
    ${inactive.length ? `<div class="section-title">Cuentas inactivas</div><div class="card">${inactive.map(a => `
      <div class="ledger-row"><div class="row-dot" style="background:${a.color}"></div><div class="row-body"><div class="row-title">${a.name}</div><div class="row-sub">${typeName(a.type)} · inactiva</div></div>
      <button class="btn ghost" data-reactivate="${a.id}" style="font-size:12px;">Reactivar</button></div>`).join('')}</div>` : ''}
    `;
  }
  function typeName(t) {
    return { corriente: 'Cuenta corriente', vista: 'Cuenta vista', debito: 'Cuenta débito', efectivo: 'Efectivo', credito: 'Tarjeta de crédito', ahorro: 'Ahorro', otra: 'Cuenta personalizada' }[t] || t;
  }

  /* ---------------- AGENDA (cuotas + programados) ---------------- */
  function agendaView(state, tab = 'cuotas') {
    return `
    <div class="seg" style="margin-bottom:16px;">
      <button data-tab="cuotas" class="${tab === 'cuotas' ? 'active' : ''}">Cuotas</button>
      <button data-tab="programados" class="${tab === 'programados' ? 'active' : ''}">Programados</button>
    </div>
    ${tab === 'cuotas' ? cuotasTab(state) : programadosTab(state)}
    `;
  }

  function cuotasTab(state) {
    if (!state.installmentPlans.length) return emptyState('card', 'Sin compras en cuotas', 'Registra una compra en cuotas desde el botón +.');
    return state.installmentPlans.map(p => {
      const card = state.accounts.find(a => a.id === p.cardId);
      const paid = p.installments.filter(i => i.status === 'paid').length;
      const pct = Math.round((paid / p.installmentsCount) * 100);
      const next = p.installments.find(i => i.status === 'pending');
      const pendingTotal = p.installments.filter(i => i.status === 'pending').reduce((s, i) => s + i.amount, 0);
      return `
      <div class="card" style="margin-bottom:10px;" data-plan="${p.id}">
        <div class="card-head" style="margin-bottom:6px;">
          <h3 style="text-transform:none;color:var(--ink);font-size:14.5px;">${p.description || 'Compra en cuotas'}</h3>
          <span class="badge ${paid === p.installmentsCount ? 'paid' : 'pending'}">${paid}/${p.installmentsCount}</span>
        </div>
        <div class="text-soft" style="margin-bottom:8px;">${card ? card.name : ''} · Total ${fmt(p.totalAmount)}</div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:10px;align-items:center;">
          <div class="text-soft">${next ? `Próxima cuota ${fmtDateHuman(next.dueDate)} · ${fmt(next.amount)}` : 'Cuotas completas'}</div>
          ${next ? `<div class="btn-row">
            <button class="btn ghost" data-pay-one="${p.id}" style="font-size:12px;">Pagar cuota</button>
            <button class="btn primary" data-pay-all="${p.id}" style="font-size:12px;">Pagar todo (${fmt(pendingTotal)})</button>
          </div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function programadosTab(state) {
    if (!state.scheduled.length) return emptyState('calendar', 'Sin gastos programados', 'Agrega arriendo, suscripciones u otros pagos recurrentes.');
    const sorted = [...state.scheduled].sort((a, b) => a.nextDate.localeCompare(b.nextDate));
    return sorted.map(s => {
      const cat = state.categories.find(c => c.id === s.categoryId);
      const d = daysUntil(s.nextDate);
      const badge = s.paused ? '<span class="badge pending">Pausado</span>' : d < 0 ? '<span class="badge overdue">Vencido</span>' : d <= 3 ? '<span class="badge pending">Próximo</span>' : '<span class="badge scheduled">Programado</span>';
      return `
      <div class="card" style="margin-bottom:10px;" data-sched="${s.id}">
        <div class="card-head" style="margin-bottom:4px;">
          <h3 style="text-transform:none;color:var(--ink);font-size:14.5px;">${s.name}</h3>
          ${badge}
        </div>
        <div class="text-soft" style="margin-bottom:10px;">${cat ? cat.name : ''} · ${freqLabel(s.frequency)} · vence ${fmtDateHuman(s.nextDate)}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div class="num" style="font-weight:600;font-size:16px;">${fmt(s.amount)}</div>
          <div class="btn-row">
            <button class="btn ghost" data-sched-pause="${s.id}" style="font-size:12px;">${s.paused ? 'Reanudar' : 'Pausar'}</button>
            ${!s.paused ? `<button class="btn primary" data-sched-pay="${s.id}" style="font-size:12px;">Marcar pagado</button>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');
  }
  function freqLabel(f) { return { monthly: 'Mensual', weekly: 'Semanal', custom: 'Personalizado' }[f] || f; }

  /* ---------------- REPORTES ---------------- */
  function reportsView(state) {
    const cats = Calc.gastosPorCategoria(state);
    const maxCat = cats.length ? cats[0].total : 1;
    const flows = Calc.last6MonthsFlow(state);
    const maxFlow = Math.max(1, ...flows.map(f => Math.max(f.ingresos, f.gastos)));
    const deuda = Calc.totalDeudaTarjetas(state);

    return `
    <div class="grid-2" style="margin-bottom:16px;">
      <div class="stub" style="--bar:var(--income)"><div class="label">Ingresos del mes</div><div class="amount num pos" style="font-size:19px;">${fmt(Calc.monthFlows(state).ingresos)}</div></div>
      <div class="stub" style="--bar:var(--expense)"><div class="label">Gastos del mes</div><div class="amount num neg" style="font-size:19px;">${fmt(Calc.monthFlows(state).gastos)}</div></div>
    </div>

    <div class="section-title">Ingresos vs. gastos — últimos 6 meses</div>
    <div class="card">
      <div class="bar-chart">
        ${flows.map(f => `
          <div class="bar-col">
            <div class="bars">
              <div class="bar income" style="height:${Math.max(3, (f.ingresos / maxFlow) * 100)}px"></div>
              <div class="bar expense" style="height:${Math.max(3, (f.gastos / maxFlow) * 100)}px"></div>
            </div>
            <div class="lbl">${f.ym.slice(5)}</div>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:16px;justify-content:center;margin-top:10px;font-size:11.5px;color:var(--ink-soft);">
        <span><span style="display:inline-block;width:8px;height:8px;background:var(--income);border-radius:2px;margin-right:4px;"></span>Ingresos</span>
        <span><span style="display:inline-block;width:8px;height:8px;background:var(--expense);border-radius:2px;margin-right:4px;"></span>Gastos</span>
      </div>
    </div>

    <div class="section-title">Gastos por categoría — este mes</div>
    <div class="card">
      ${cats.length ? cats.map(c => `
        <div class="cat-bar-row">
          <div class="top"><span>${c.cat.name}</span><span class="amt">${fmt(c.total)}</span></div>
          <div class="cat-track"><div class="cat-fill" style="width:${(c.total / maxCat) * 100}%;background:${c.cat.color}"></div></div>
        </div>`).join('') : emptyState('chart', 'Sin gastos este mes', 'Cuando registres gastos verás aquí el desglose por categoría.')}
    </div>

    <div class="section-title">Deuda y compromisos</div>
    <div class="grid-3">
      <div class="card"><div class="text-soft">Deuda en tarjetas</div><div class="num" style="font-size:17px;font-weight:600;margin-top:4px;">${fmt(deuda)}</div></div>
      <div class="card"><div class="text-soft">Cuotas pendientes (mes)</div><div class="num" style="font-size:17px;font-weight:600;margin-top:4px;">${fmt(Calc.installmentsDueThisMonthUnpaid(state).reduce((s, x) => s + x.inst.amount, 0))}</div></div>
      <div class="card"><div class="text-soft">Programados próx. 7 días</div><div class="num" style="font-size:17px;font-weight:600;margin-top:4px;">${fmt(Calc.scheduledDueWithin(state, 7).reduce((s, x) => s + x.amount, 0))}</div></div>
    </div>
    `;
  }

  /* ---------------- CONFIGURACIÓN ---------------- */
  function settingsView(state) {
    return `
    <div class="card" style="margin-bottom:14px;">
      <div class="card-head"><h3>Apariencia</h3></div>
      <div class="ledger-row" style="cursor:default;">
        <div class="row-body"><div class="row-title">Modo oscuro</div><div class="row-sub">Se guarda en este dispositivo</div></div>
        <label class="seg" style="width:auto;">
          <button data-theme="light" class="${state.settings.theme === 'light' ? 'active' : ''}">${icon('sun')}</button>
          <button data-theme="dark" class="${state.settings.theme === 'dark' ? 'active' : ''}">${icon('moon')}</button>
        </label>
      </div>
    </div>
    <div class="card" style="margin-bottom:14px;">
      <div class="card-head"><h3>Seguridad</h3></div>
      <div class="ledger-row" style="cursor:default;">
        <div class="row-body"><div class="row-title">Bloqueo al abrir</div><div class="row-sub">Pide confirmación visual antes de mostrar tus datos</div></div>
        <input type="checkbox" id="lockToggle" ${state.settings.lockEnabled ? 'checked' : ''} style="width:20px;height:20px;">
      </div>
    </div>
    <div class="card" style="margin-bottom:14px;">
      <div class="card-head"><h3>Categorías</h3></div>
      ${state.categories.map(c => `<div class="ledger-row" style="cursor:default;"><div class="row-dot" style="background:${c.color}"></div><div class="row-body"><div class="row-title">${c.name}</div></div><span class="text-soft">${c.kind === 'income' ? 'Ingreso' : c.kind === 'transfer' ? 'Transferencia' : 'Gasto'}</span></div>`).join('')}
    </div>
    <div class="card" style="margin-bottom:14px;">
      <div class="card-head"><h3>Datos</h3></div>
      <div class="btn-row">
        <button class="btn" id="btnExport">${icon('download')} Exportar CSV</button>
        <button class="btn danger" id="btnReset">${icon('reset')} Restablecer datos de ejemplo</button>         <button class="btn danger" id="btnNuevoInicio" style="border-color:var(--expense);border-width:2px;">${icon('trash')} Iniciar desde cero</button>
      </div>
      <p class="hint">Tus datos se guardan solo en este dispositivo (localStorage). Exportar te permite respaldarlos.</p>
    </div>
    <div class="text-soft" style="text-align:center;margin-top:24px;">Ledger · Finanzas Personales · v1.0</div>
    `;
  }

  return {
    dashboard, movementsView, accountsView, agendaView, reportsView, settingsView,
    movementRow, typeLabel
  };
})();

// ==== js/forms.js ====
/* ============================================================
   FORMS — Genera el HTML de los formularios que se muestran en el sheet
   ============================================================ */
const Forms = (() => {
  const { icon } = UI;
  const COLORS = ['#2D3A8C', '#1B8A5A', '#C9862A', '#B23A2E', '#8C6BB1', '#3E8FB0', '#4E7A51', '#B0559A', '#6B7A72'];

  function accountOptions(state, { onlyCash = false, excludeId = null } = {}) {
    return state.accounts.filter(a => a.active && (!onlyCash || a.type !== 'credito') && a.id !== excludeId)
      .map(a => `<option value="${a.id}">${a.name}</option>`).join('');
  }
  function creditAccountOptions(state) {
    return state.accounts.filter(a => a.active && a.type === 'credito').map(a => `<option value="${a.id}">${a.name}</option>`).join('');
  }
  function categoryOptions(state, kind) {
    return state.categories.filter(c => c.kind === kind).map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  }
  function colorSwatches(selected) {
    return `<div class="swatch-row">${COLORS.map(c => `<div class="swatch-pick ${c === selected ? 'active' : ''}" data-color="${c}" style="background:${c}"></div>`).join('')}</div>`;
  }

  function sheetHead(title) {
    return `<div class="sheet-head"><h2>${title}</h2><button class="icon-btn" id="sheetClose">${icon('close')}</button></div>`;
  }

  /* ---- Elegir tipo de movimiento ---- */
  function movementChooser() {
    const opts = [
      { type: 'income', label: 'Ingreso', ic: 'up', desc: 'Sueldo, venta, ingreso extra' },
      { type: 'expense', label: 'Gasto', ic: 'down', desc: 'Compra pagada al contado o débito' },
      { type: 'transfer', label: 'Transferencia', ic: 'swap', desc: 'Entre cuentas propias' },
      { type: 'installment', label: 'Compra con tarjeta', ic: 'card', desc: 'Al contado o en cuotas' },
      { type: 'scheduled', label: 'Gasto programado', ic: 'calendar', desc: 'Arriendo, suscripción, recurrente' },
      { type: 'adjustment', label: 'Ajuste de saldo', ic: 'edit', desc: 'Corregir el saldo de una cuenta' },
    ];
    return `${sheetHead('Nuevo movimiento')}
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${opts.map(o => `<button class="ledger-row" data-choose="${o.type}" style="border:1px solid var(--hairline);border-radius:var(--radius-s);padding:12px;">
        <div class="icon-btn" style="pointer-events:none;">${icon(o.ic)}</div>
        <div class="row-body"><div class="row-title">${o.label}</div><div class="row-sub">${o.desc}</div></div>
        ${icon('chevron')}
      </button>`).join('')}
    </div>`;
  }

  function incomeExpenseForm(state, type) {
    const isIncome = type === 'income';
    return `${sheetHead(isIncome ? 'Nuevo ingreso' : 'Nuevo gasto')}
    <form id="movForm" data-type="${type}">
      <div class="field"><label>Monto</label><input class="num-input" type="number" min="1" step="1" name="amount" placeholder="0" required autofocus></div>
      <div class="field"><label>Cuenta</label><select name="accountId" required>${accountOptions(state, { onlyCash: true })}</select></div>
      <div class="field"><label>Categoría</label><select name="categoryId" required>${categoryOptions(state, isIncome ? 'income' : 'expense')}</select></div>
      <div class="field-row">
        <div class="field"><label>Fecha</label><input type="date" name="date" value="${DB.todayISO()}" required></div>
        <div class="field"><label>Descripción</label><input type="text" name="description" placeholder="Opcional"></div>
      </div>
      <button class="btn primary block" type="submit">Guardar ${isIncome ? 'ingreso' : 'gasto'}</button>
    </form>`;
  }

  function transferForm(state) {
    return `${sheetHead('Transferencia entre cuentas')}
    <form id="movForm" data-type="transfer">
      <div class="field"><label>Monto</label><input class="num-input" type="number" min="1" name="amount" placeholder="0" required autofocus></div>
      <div class="field-row">
        <div class="field"><label>Desde</label><select name="fromId" id="tFrom" required>${accountOptions(state, { onlyCash: true })}</select></div>
        <div class="field"><label>Hacia</label><select name="toId" id="tTo" required></select></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Fecha</label><input type="date" name="date" value="${DB.todayISO()}" required></div>
        <div class="field"><label>Nota</label><input type="text" name="description" placeholder="Opcional"></div>
      </div>
      <p class="hint">Las transferencias entre tus propias cuentas no se cuentan como ingreso ni gasto en tus reportes.</p>
      <button class="btn primary block" type="submit">Transferir</button>
    </form>`;
  }

  function installmentForm(state) {
    if (!Calc.creditAccounts(state).length) {
      return `${sheetHead('Compra con tarjeta')}${`<div class="empty-state">${icon('card')}<p>Primero crea una tarjeta de crédito en la sección Cuentas.</p></div>`}`;
    }
    return `${sheetHead('Compra con tarjeta')}
    <form id="movForm" data-type="installment">
      <div class="field"><label>Monto total</label><input class="num-input" type="number" min="1" name="totalAmount" placeholder="0" required autofocus></div>
      <div class="field"><label>Tarjeta</label><select name="cardId" required>${creditAccountOptions(state)}</select></div>
      <div class="field"><label>Número de cuotas</label><input class="num-input" type="number" min="1" max="48" name="installmentsCount" value="1" required></div>
      <div class="field"><label>Categoría</label><select name="categoryId" required>${categoryOptions(state, 'expense')}</select></div>
      <div class="field-row">
        <div class="field"><label>Fecha de compra</label><input type="date" name="purchaseDate" value="${DB.todayISO()}" required></div>
        <div class="field"><label>Descripción</label><input type="text" name="description" placeholder="¿Qué compraste?"></div>
      </div>
      <p class="hint">El cupo de la tarjeta se descuenta por el total de la compra; no afecta el saldo de tus cuentas de efectivo hasta que pagues cuotas.</p>
      <button class="btn primary block" type="submit">Registrar compra</button>
    </form>`;
  }

  function adjustmentForm(state) {
    return `${sheetHead('Ajuste de saldo')}
    <form id="movForm" data-type="adjustment">
      <div class="field"><label>Cuenta</label><select name="accountId" required>${accountOptions(state, { onlyCash: true })}</select></div>
      <div class="field"><label>Saldo real actual</label><input class="num-input" type="number" name="newBalance" placeholder="0" required></div>
      <div class="field"><label>Motivo</label><input type="text" name="note" placeholder="Ej: corrección tras conciliar cartola"></div>
      <button class="btn primary block" type="submit">Ajustar saldo</button>
    </form>`;
  }

  function scheduledForm(state, existing) {
    const s = existing || {};
    return `${sheetHead(existing ? 'Editar gasto programado' : 'Nuevo gasto programado')}
    <form id="schedForm" data-id="${existing ? existing.id : ''}">
      <div class="field"><label>Nombre</label><input type="text" name="name" value="${s.name || ''}" placeholder="Ej: Arriendo" required autofocus></div>
      <div class="field-row">
        <div class="field"><label>Monto</label><input class="num-input" type="number" min="1" name="amount" value="${s.amount || ''}" required></div>
        <div class="field"><label>Día del mes</label><input class="num-input" type="number" min="1" max="28" name="dayOfMonth" value="${s.dayOfMonth || 5}" required></div>
      </div>
      <div class="field"><label>Categoría</label><select name="categoryId" required>${categoryOptions(state, 'expense')}</select></div>
      <div class="field"><label>Cuenta de pago</label><select name="accountId" required>${accountOptions(state, { onlyCash: true })}</select></div>
      <div class="field"><label>Frecuencia</label><select name="frequency"><option value="monthly">Mensual</option><option value="weekly">Semanal</option></select></div>
      <button class="btn primary block" type="submit">Guardar</button>
    </form>`;
  }

  function accountForm(state, existing) {
    const a = existing || { color: COLORS[0] };
    return `${sheetHead(existing ? 'Editar cuenta' : 'Nueva cuenta')}
    <form id="accForm" data-id="${existing ? existing.id : ''}">
      <div class="field"><label>Nombre</label><input type="text" name="name" value="${a.name || ''}" placeholder="Ej: Cuenta RUT" required autofocus></div>
      <div class="field"><label>Tipo</label><select name="type" id="accType">
        <option value="corriente" ${a.type === 'corriente' ? 'selected' : ''}>Cuenta corriente</option>
        <option value="vista" ${a.type === 'vista' ? 'selected' : ''}>Cuenta vista</option>
        <option value="debito" ${a.type === 'debito' ? 'selected' : ''}>Cuenta débito</option>
        <option value="efectivo" ${a.type === 'efectivo' ? 'selected' : ''}>Efectivo</option>
        <option value="ahorro" ${a.type === 'ahorro' ? 'selected' : ''}>Ahorro</option>
        <option value="credito" ${a.type === 'credito' ? 'selected' : ''}>Crédito / tarjeta con cupo</option>
        <option value="otra" ${a.type === 'otra' ? 'selected' : ''}>Personalizada</option>
      </select></div>
      <div class="field" id="balField"><label>${existing ? 'Saldo actual' : 'Saldo inicial'}</label><input class="num-input" type="number" name="balance" value="${existing ? a.currentBalance : ''}" placeholder="0" ${existing ? 'disabled' : ''}></div>
      <div id="creditFields" class="${a.type === 'credito' ? '' : 'hidden'}">
        <div class="field-row">
          <div class="field"><label>Cupo total</label><input class="num-input" type="number" name="creditLimit" value="${a.creditLimit || ''}"></div>
          <div class="field"><label>Día facturación</label><input class="num-input" type="number" min="1" max="28" name="billingDay" value="${a.billingDay || 5}"></div>
        </div>
      </div>
      <div class="field"><label>Color</label>${colorSwatches(a.color)}<input type="hidden" name="color" value="${a.color}"></div>
      <button class="btn primary block" type="submit">Guardar cuenta</button>
      ${existing ? `<button type="button" class="btn danger block" id="btnDeactivate" style="margin-top:8px;">Eliminar cuenta</button>` : ''}
    </form>`;
  }

  function payPlanConfirm(state, plan, mode) {
    const pending = plan.installments.filter(i => i.status === 'pending');
    const amount = mode === 'all' ? pending.reduce((s, i) => s + i.amount, 0) : pending[0].amount;
    return `${sheetHead(mode === 'all' ? 'Pagar todas las cuotas' : 'Pagar próxima cuota')}
    <form id="payForm" data-plan="${plan.id}" data-mode="${mode}">
      <p class="hint" style="margin-bottom:12px;">Monto a pagar: <b class="num">${fmt(amount)}</b></p>
      <div class="field"><label>Pagar desde</label><select name="accountId" required>${accountOptions(state, { onlyCash: true })}</select></div>
      <button class="btn primary block" type="submit">Confirmar pago</button>
    </form>`;
  }
  const fmt = Calc.fmt;

  return {
    movementChooser, incomeExpenseForm, transferForm, installmentForm, adjustmentForm,
    scheduledForm, accountForm, payPlanConfirm, accountOptions
  };
})();

// ==== js/app.js ====
/* ============================================================
   APP — Shell, router (hash-based) y orquestación de eventos.
   Cada acción que muta datos pasa por Engine.* y luego persist().
   ============================================================ */
(() => {
  let state = DB.load();
  let route = { name: 'home', params: {} };
  let movFilter = {};
  let agendaTab = 'cuotas';

  function persist() { DB.save(state); }

  const NAV = [
    { key: 'home', label: 'Inicio', ic: 'home' },
    { key: 'movements', label: 'Movimientos', ic: 'list' },
    { key: 'accounts', label: 'Cuentas', ic: 'wallet' },
    { key: 'agenda', label: 'Agenda', ic: 'calendar' },
    { key: 'reports', label: 'Reportes', ic: 'chart' },
  ];

  function applyTheme() {
    document.documentElement.classList.toggle('dark', state.settings.theme === 'dark');
  }

  function pageTitle() {
    return { home: 'Inicio', movements: 'Movimientos', accounts: 'Cuentas', agenda: 'Agenda', reports: 'Reportes', settings: 'Configuración' }[route.name] || 'Ledger';
  }

  function renderShell() {
    applyTheme();
    const app = document.getElementById('app');
    app.innerHTML = `
      <aside class="sidebar">
        <div class="brand"><span class="mark"></span>Ledger</div>
        ${NAV.map(n => `<button class="nav-item ${route.name === n.key ? 'active' : ''}" data-nav="${n.key}">${UI.icon(n.ic)}${n.label}</button>`).join('')}
        <div style="flex:1"></div>
        <button class="nav-item ${route.name === 'settings' ? 'active' : ''}" data-nav="settings">${UI.icon('settings')}Configuración</button>
      </aside>
      <div class="main">
        <div class="topbar">
          <h1>${pageTitle()}</h1>
          <div class="actions">
            <span class="status-pill ${navigator.onLine ? '' : 'offline'}" id="statusPill"><span class="status-dot"></span>${navigator.onLine ? 'En línea' : 'Sin conexión'}</span>
            <button class="icon-btn" data-nav="settings" aria-label="Configuración">${UI.icon('settings')}</button>
          </div>
        </div>
        <div class="content" id="content"></div>
      </div>
      <button class="fab" id="fabAdd" aria-label="Agregar movimiento">${UI.icon('plus')}</button>
      <nav class="bottom-nav">
        ${NAV.map(n => `<button class="bn-item ${route.name === n.key ? 'active' : ''}" data-nav="${n.key}">${UI.icon(n.ic)}<span>${n.label}</span></button>`).join('')}
      </nav>
    `;
    renderContent();
    bindShellEvents();
  }

  function renderContent() {
    const c = document.getElementById('content');
    if (!c) return;
    if (route.name === 'home') c.innerHTML = Views.dashboard(state);
    else if (route.name === 'movements') c.innerHTML = Views.movementsView(state, movFilter);
    else if (route.name === 'accounts') c.innerHTML = Views.accountsView(state);
    else if (route.name === 'agenda') c.innerHTML = Views.agendaView(state, agendaTab);
    else if (route.name === 'reports') c.innerHTML = Views.reportsView(state);
    else if (route.name === 'settings') c.innerHTML = Views.settingsView(state);
    bindContentEvents();
  }

  function goto(name) { route = { name, params: {} }; renderShell(); }

  /* ---------------- Bind: shell-level (persistent) ---------------- */
  function bindShellEvents() {
    document.querySelectorAll('[data-nav]').forEach(b => b.onclick = () => goto(b.dataset.nav));
    document.getElementById('fabAdd').onclick = () => openMovementChooser();
  }

  /* ---------------- Bind: content-level (re-bound on every render) ---------------- */
  function bindContentEvents() {
    if (route.name === 'movements') {
      const search = document.getElementById('movSearch');
      if (search) search.oninput = debounce(() => { movFilter.q = search.value; renderContent(); }, 250);
      document.querySelectorAll('#movChips .chip').forEach(ch => ch.onclick = () => {
        movFilter.type = ch.dataset.type || undefined; renderContent();
      });
      document.querySelectorAll('[data-mov]').forEach(row => row.onclick = () => openMovementDetail(row.dataset.mov));
    }
    if (route.name === 'accounts') {
      document.querySelectorAll('[data-acc]').forEach(card => card.onclick = () => openAccountForm(card.dataset.acc));
      document.querySelectorAll('[data-reactivate]').forEach(b => b.onclick = (e) => {
        e.stopPropagation();
        state.accounts.find(a => a.id === b.dataset.reactivate).active = true;
        persist(); renderContent(); UI.toast('Cuenta reactivada');
      });
    }
    if (route.name === 'agenda') {
      document.querySelectorAll('[data-tab]').forEach(t => t.onclick = () => { agendaTab = t.dataset.tab; renderContent(); });
      document.querySelectorAll('[data-pay-one]').forEach(b => b.onclick = () => openPayPlan(b.dataset.payOne, 'one'));
      document.querySelectorAll('[data-pay-all]').forEach(b => b.onclick = () => openPayPlan(b.dataset.payAll, 'all'));
      document.querySelectorAll('[data-sched-pay]').forEach(b => b.onclick = () => {
        Engine.markScheduledPaid(state, b.dataset.schedPay);
        persist(); renderContent(); renderTopbarStatus();
        UI.toast('Gasto marcado como pagado');
      });
      document.querySelectorAll('[data-sched-pause]').forEach(b => b.onclick = () => {
        const s = state.scheduled.find(x => x.id === b.dataset.schedPause);
        s.paused = !s.paused; persist(); renderContent();
      });
    }
    if (route.name === 'settings') {
      document.querySelectorAll('[data-theme]').forEach(b => b.onclick = () => {
        state.settings.theme = b.dataset.theme; persist(); applyTheme(); renderContent();
      });
      const lock = document.getElementById('lockToggle');
      if (lock) lock.onchange = () => { state.settings.lockEnabled = lock.checked; persist(); };
      document.getElementById('btnExport').onclick = () => {
        const csv = DB.exportCSV(state);
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = 'ledger-movimientos.csv'; a.click();
        UI.toast('CSV exportado');
      };
      document.getElementById('btnReset').onclick = () => {
        if (confirm('Esto reemplazará todos tus datos actuales por datos de ejemplo. ¿Continuar?')) {
          state = DB.resetAll(); renderShell(); UI.toast('Datos restablecidos'); } }; const _bni = document.getElementById('btnNuevoInicio'); if (_bni) _bni.onclick = () => { if (confirm('⚠️ ¿Iniciar desde cero? Se eliminarán TODAS las cuentas, movimientos y datos. No se puede deshacer.')) { localStorage.removeItem('ledger:v1'); location.reload(); } };
        }
      };
    }
  }

  function renderTopbarStatus() { /* home/reports depend on live totals; simplest: re-render whole shell content on money-affecting actions */ }

  /* ---------------- Movimientos: flujo de creación ---------------- */
  function openMovementChooser() {
    UI.openSheet(Forms.movementChooser());
    document.getElementById('sheetClose').onclick = UI.closeSheet;
    document.querySelectorAll('[data-choose]').forEach(b => b.onclick = () => {
      const t = b.dataset.choose;
      if (t === 'income' || t === 'expense') openMovementForm(t);
      else if (t === 'transfer') openTransferForm();
      else if (t === 'installment') openInstallmentForm();
      else if (t === 'scheduled') openScheduledForm();
      else if (t === 'adjustment') openAdjustmentForm();
    });
  }

  function openMovementForm(type) {
    UI.openSheet(Forms.incomeExpenseForm(state, type));
    document.getElementById('sheetClose').onclick = UI.closeSheet;
    document.getElementById('movForm').onsubmit = (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = { accountId: fd.get('accountId'), amount: Number(fd.get('amount')), categoryId: fd.get('categoryId'), description: fd.get('description'), date: fd.get('date') };
      try {
        if (type === 'income') Engine.applyIncome(state, payload); else Engine.applyExpense(state, payload);
        persist(); UI.closeSheet(); renderContent(); if (route.name !== 'home') { /* no-op */ } UI.toast(type === 'income' ? 'Ingreso registrado' : 'Gasto registrado');
        if (route.name === 'movements' || route.name === 'home') renderContent();
      } catch (err) { UI.toast(err.message); }
    };
  }

  function openTransferForm() {
    UI.openSheet(Forms.transferForm(state));
    document.getElementById('sheetClose').onclick = UI.closeSheet;
    const fromSel = document.getElementById('tFrom'), toSel = document.getElementById('tTo');
    function refreshTo() { toSel.innerHTML = Forms.accountOptions(state, { onlyCash: true, excludeId: fromSel.value }); }
    fromSel.onchange = refreshTo; refreshTo();
    document.getElementById('movForm').onsubmit = (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      try {
        Engine.applyTransfer(state, { fromId: fd.get('fromId'), toId: fd.get('toId'), amount: Number(fd.get('amount')), description: fd.get('description'), date: fd.get('date') });
        persist(); UI.closeSheet(); renderContent(); UI.toast('Transferencia realizada');
      } catch (err) { UI.toast(err.message); }
    };
  }

  function openInstallmentForm() {
    UI.openSheet(Forms.installmentForm(state));
    document.getElementById('sheetClose').onclick = UI.closeSheet;
    const form = document.getElementById('movForm');
    if (!form) return;
    form.onsubmit = (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      Engine.applyInstallmentPurchase(state, {
        cardId: fd.get('cardId'), totalAmount: Number(fd.get('totalAmount')),
        installmentsCount: Number(fd.get('installmentsCount')), categoryId: fd.get('categoryId'),
        description: fd.get('description'), purchaseDate: fd.get('purchaseDate')
      });
      persist(); UI.closeSheet(); renderContent(); UI.toast('Compra registrada');
    };
  }

  function openAdjustmentForm() {
    UI.openSheet(Forms.adjustmentForm(state));
    document.getElementById('sheetClose').onclick = UI.closeSheet;
    document.getElementById('movForm').onsubmit = (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      Engine.applyAdjustment(state, { accountId: fd.get('accountId'), newBalance: Number(fd.get('newBalance')), note: fd.get('note') });
      persist(); UI.closeSheet(); renderContent(); UI.toast('Saldo ajustado');
    };
  }

  function openScheduledForm(existing) {
    UI.openSheet(Forms.scheduledForm(state, existing));
    document.getElementById('sheetClose').onclick = UI.closeSheet;
    document.getElementById('schedForm').onsubmit = (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const dayOfMonth = Number(fd.get('dayOfMonth'));
      state.scheduled.push({
        id: DB.uid('sch'), name: fd.get('name'), amount: Number(fd.get('amount')),
        categoryId: fd.get('categoryId'), accountId: fd.get('accountId'), frequency: fd.get('frequency'),
        dayOfMonth, nextDate: DB.nextMonthlyDate(dayOfMonth), status: 'pending', paused: false
      });
      persist(); UI.closeSheet(); route = { name: 'agenda' }; agendaTab = 'programados'; renderShell(); UI.toast('Gasto programado creado');
    };
  }

  function openPayPlan(planId, mode) {
    const plan = state.installmentPlans.find(p => p.id === planId);
    UI.openSheet(Forms.payPlanConfirm(state, plan, mode));
    document.getElementById('sheetClose').onclick = UI.closeSheet;
    document.getElementById('payForm').onsubmit = (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      if (mode === 'all') Engine.payFullPlan(state, { planId, accountId: fd.get('accountId') });
      else Engine.payInstallments(state, { planId, accountId: fd.get('accountId'), count: 1 });
      persist(); UI.closeSheet(); renderContent(); UI.toast('Pago registrado');
    };
  }

  function openAccountForm(accountId) {
    const existing = accountId ? state.accounts.find(a => a.id === accountId) : null;
    UI.openSheet(Forms.accountForm(state, existing));
    document.getElementById('sheetClose').onclick = UI.closeSheet;
    const typeSel = document.getElementById('accType');
    const creditFields = document.getElementById('creditFields');
    typeSel.onchange = () => creditFields.classList.toggle('hidden', typeSel.value !== 'credito');
    document.querySelectorAll('.swatch-pick').forEach(sw => sw.onclick = () => {
      document.querySelectorAll('.swatch-pick').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      document.querySelector('input[name=color]').value = sw.dataset.color;
    });
    document.getElementById('accForm').onsubmit = (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const type = fd.get('type');
      if (existing) {
        existing.name = fd.get('name'); existing.type = type; existing.color = fd.get('color');
        if (type === 'credito') { existing.creditLimit = Number(fd.get('creditLimit') || 0); existing.billingDay = Number(fd.get('billingDay') || 5); }
      } else {
        const bal = Number(fd.get('balance') || 0);
        const acc = {
          id: DB.uid('acc'), name: fd.get('name'), type, initialBalance: bal, currentBalance: bal,
          currency: 'CLP', color: fd.get('color'), active: true
        };
        if (type === 'credito') { acc.creditLimit = Number(fd.get('creditLimit') || 0); acc.usedCredit = 0; acc.billingDay = Number(fd.get('billingDay') || 5); }
        state.accounts.push(acc);
      }
      persist(); UI.closeSheet(); renderContent(); UI.toast('Cuenta guardada');
    };
    const del = document.getElementById('btnDeactivate');
    if (del) del.onclick = () => {
      if (confirm('¿Desactivar esta cuenta? Se conserva su historial pero dejará de sumar al balance.')) {
        const idx = state.accounts.findIndex(a => a.id === existing.id); if (idx !== -1) { state.accounts.splice(idx, 1); state.movements = state.movements.filter(m => m.accountId !== existing.id && m.toAccountId !== existing.id); } persist(); UI.closeSheet(); renderContent(); UI.toast('Cuenta eliminada');
      }
    };
  }

  function openMovementDetail(movId) {
    const m = state.movements.find(x => x.id === movId);
    if (!m) return;
    const acc = state.accounts.find(a => a.id === m.accountId);
    UI.openSheet(`
      <div class="sheet-head"><h2>${Views.typeLabel(m.type)}</h2><button class="icon-btn" id="sheetClose">${UI.icon('close')}</button></div>
      <div class="stub" style="--bar:${acc ? acc.color : '#999'};margin-bottom:16px;">
        <div class="label">${m.description || Views.typeLabel(m.type)}</div>
        <div class="amount num">${Calc.fmt(m.amount)}</div>
        <div class="sub">${m.date} · ${acc ? acc.name : ''}</div>
      </div>
      <button class="btn danger block" id="btnDeleteMov">${UI.icon('trash')} Eliminar movimiento</button>
    `);
    document.getElementById('sheetClose').onclick = UI.closeSheet;
    document.getElementById('btnDeleteMov').onclick = () => {
      if (confirm('¿Eliminar este movimiento? Se revertirá su efecto en el saldo de la cuenta.')) {
        Engine.deleteMovement(state, movId); persist(); UI.closeSheet(); renderContent(); UI.toast('Movimiento eliminado');
      }
    };
  }

  function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

  /* ---------------- Online/offline ---------------- */
  window.addEventListener('online', () => { const p = document.getElementById('statusPill'); if (p) { p.classList.remove('offline'); p.innerHTML = '<span class="status-dot"></span>En línea'; } });
  window.addEventListener('offline', () => { const p = document.getElementById('statusPill'); if (p) { p.classList.add('offline'); p.innerHTML = '<span class="status-dot"></span>Sin conexión'; } });

  /* ---------------- Service worker ---------------- */
  /* Service worker deshabilitado en esta vista previa; se activa en el proyecto real descargado. */

  renderShell();
})();

</script>
</body>
</html>
