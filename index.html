<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ledger — Finanzas Personales</title>
<meta name="description" content="Control total de ingresos, gastos, cuotas, cuentas y tarjetas de crédito.">
<meta name="theme-color" content="#0E1512">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   LEDGER — Design Tokens
   Metáfora: el talonario / libro mayor. Barra de color por cuenta,
   cifras tabulares alineadas a la derecha como en un estado de cuenta real.
   ============================================================ */
:root{
  --paper:#F4F6F4;
  --paper-raised:#FFFFFF;
  --ink:#10231B;
  --ink-soft:#4B5D54;
  --hairline:#D8DED9;
  --accent:#2D3A8C;
  --accent-soft:#E7E9F7;
  --income:#1B8A5A;
  --income-soft:#E3F3EA;
  --expense:#B23A2E;
  --expense-soft:#FBE9E7;
  --pending:#C9862A;
  --pending-soft:#FBEEDD;
  --radius-s:8px;
  --radius-m:14px;
  --radius-l:20px;
  --shadow:0 1px 2px rgba(16,35,27,.06), 0 8px 24px -12px rgba(16,35,27,.18);
  --font-display:'Space Grotesk',system-ui,sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'Roboto Mono',ui-monospace,monospace;
  color-scheme: light;
}
html.dark{
  --paper:#0E1512;
  --paper-raised:#16211B;
  --ink:#E7EFE9;
  --ink-soft:#94A79C;
  --hairline:#26362C;
  --accent:#8C9AFF;
  --accent-soft:#1E2340;
  --income:#4FD394;
  --income-soft:#123626;
  --expense:#F0776A;
  --expense-soft:#3A1C18;
  --pending:#E3AC5C;
  --pending-soft:#3A2C14;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 12px 28px -14px rgba(0,0,0,.6);
  color-scheme: dark;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  transition:background .2s ease, color .2s ease;
}
button, input, select, textarea{font-family:inherit;}
.num{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}
h1,h2,h3{font-family:var(--font-display);margin:0;letter-spacing:-.01em;}
a{color:inherit;}
::selection{background:var(--accent-soft);}

/* Focus visibility */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
@media (prefers-reduced-motion: reduce){ *{animation-duration:.01ms !important; transition-duration:.01ms !important;} }

/* ============ Layout shell ============ */
#app{ display:flex; min-height:100%; }
.sidebar{
  display:none;
  width:224px; flex-shrink:0; padding:20px 12px;
  border-right:1px solid var(--hairline);
  flex-direction:column; gap:4px;
}
.sidebar .brand{ font-family:var(--font-display); font-weight:700; font-size:19px; padding:8px 12px 20px; display:flex; align-items:center; gap:8px;}
.brand .mark{width:16px;height:16px;border-radius:3px;background:var(--income);flex-shrink:0;}
.nav-item{
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:var(--radius-s);
  font-size:14px; font-weight:500; color:var(--ink-soft);
  cursor:pointer; border:none; background:none; text-align:left; width:100%;
}
.nav-item:hover{ background:var(--paper-raised); }
.nav-item.active{ background:var(--accent-soft); color:var(--accent); font-weight:600; }
.nav-item .ic{width:18px;height:18px;flex-shrink:0;}

.main{ flex:1; min-width:0; display:flex; flex-direction:column; }
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px; border-bottom:1px solid var(--hairline);
  position:sticky; top:0; background:var(--paper); z-index:5;
}
.topbar h1{font-size:20px;}
.topbar .actions{display:flex; align-items:center; gap:10px;}
.icon-btn{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--hairline);
  background:var(--paper-raised); display:flex;align-items:center;justify-content:center;
  cursor:pointer; color:var(--ink);
}
.icon-btn:hover{border-color:var(--accent);}
.status-pill{
  display:flex; align-items:center; gap:6px; font-size:12px; font-weight:500;
  padding:5px 10px; border-radius:999px; background:var(--paper-raised); border:1px solid var(--hairline); color:var(--ink-soft);
}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--income);}
.status-pill.offline .status-dot{background:var(--expense);}

.content{ padding:16px 20px 96px; max-width:1080px; width:100%; margin:0 auto; }

/* Bottom nav (mobile) */
.bottom-nav{
  position:fixed; bottom:0; left:0; right:0; z-index:10;
  display:flex; justify-content:space-around; align-items:center;
  background:var(--paper-raised); border-top:1px solid var(--hairline);
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  box-shadow:0 -2px 12px rgba(0,0,0,.05);
}
.bn-item{
  display:flex; flex-direction:column; align-items:center; gap:2px;
  border:none; background:none; color:var(--ink-soft); font-size:10.5px; font-weight:500;
  padding:6px 8px; border-radius:10px; cursor:pointer; flex:1;
}
.bn-item.active{ color:var(--accent); }
.bn-item .ic{width:21px;height:21px;}
.fab{
  position:fixed; right:18px; bottom:74px; z-index:12;
  width:56px;height:56px;border-radius:50%;
  background:var(--accent); color:#fff; border:none; box-shadow:var(--shadow);
  display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:26px;
}
@media (min-width: 900px){
  .sidebar{display:flex;}
  .bottom-nav{display:none;}
  .fab{ right:32px; bottom:32px; }
  .content{padding:24px 32px 48px;}
}

/* ============ Ledger-stub cards (signature element) ============ */
.stub{
  position:relative; background:var(--paper-raised); border-radius:var(--radius-m);
  border:1px solid var(--hairline); box-shadow:var(--shadow);
  padding:16px 16px 16px 20px; overflow:hidden;
}
.stub::before{
  content:''; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--bar,var(--accent));
}
.stub .label{font-size:12px; color:var(--ink-soft); font-weight:500; text-transform:uppercase; letter-spacing:.04em;}
.stub .amount{font-family:var(--font-mono); font-size:26px; font-weight:600; margin-top:4px; letter-spacing:-.01em;}
.stub .amount.neg{color:var(--expense);}
.stub .amount.pos{color:var(--income);}
.stub .sub{font-size:12px; color:var(--ink-soft); margin-top:4px;}

.grid-2{display:grid; grid-template-columns:1fr; gap:12px;}
.grid-3{display:grid; grid-template-columns:1fr; gap:12px;}
@media (min-width:640px){ .grid-2{grid-template-columns:1fr 1fr;} .grid-3{grid-template-columns:repeat(3,1fr);} }

.card{
  background:var(--paper-raised); border:1px solid var(--hairline); border-radius:var(--radius-m);
  padding:16px; box-shadow:var(--shadow);
}
.card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
.card-head h3{font-size:14px; font-weight:600; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em;}
.section-title{font-size:15px; font-weight:600; margin:28px 0 12px;}
.section-title:first-child{margin-top:0;}

/* Ledger row list — hairline-separated, tabular numbers right-aligned */
.ledger-row{
  display:flex; align-items:center; gap:12px; padding:11px 2px;
  border-bottom:1px solid var(--hairline); cursor:pointer;
}
.ledger-row:last-child{border-bottom:none;}
.ledger-row:hover{background:var(--paper);}
.row-dot{width:8px;height:8px;border-radius:50%; flex-shrink:0;}
.row-body{flex:1; min-width:0;}
.row-title{font-size:14px; font-weight:500;}
.row-sub{font-size:12px; color:var(--ink-soft); margin-top:1px;}
.row-amount{font-family:var(--font-mono); font-size:14px; font-weight:600; white-space:nowrap;}
.row-amount.pos{color:var(--income);}
.row-amount.neg{color:var(--expense);}
.row-amount.pending{color:var(--pending);}

.badge{
  font-size:10.5px; font-weight:600; padding:3px 8px; border-radius:999px; text-transform:uppercase; letter-spacing:.02em;
}
.badge.pending{background:var(--pending-soft); color:var(--pending);}
.badge.paid{background:var(--income-soft); color:var(--income);}
.badge.overdue{background:var(--expense-soft); color:var(--expense);}
.badge.scheduled{background:var(--accent-soft); color:var(--accent);}

.empty-state{
  text-align:center; padding:40px 20px; color:var(--ink-soft);
}
.empty-state .ic{font-size:32px; margin-bottom:8px; opacity:.5;}
.empty-state p{font-size:13px; max-width:280px; margin:4px auto 0;}

.skeleton{ background:linear-gradient(90deg, var(--hairline) 25%, var(--paper) 50%, var(--hairline) 75%); background-size:200% 100%; animation:shimmer 1.3s infinite; border-radius:8px;}
@keyframes shimmer{ 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

/* Buttons */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  font-size:13.5px; font-weight:600; padding:10px 16px; border-radius:var(--radius-s);
  border:1px solid var(--hairline); background:var(--paper-raised); color:var(--ink); cursor:pointer;
}
.btn.primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
.btn.danger{ background:var(--expense-soft); border-color:transparent; color:var(--expense); }
.btn.ghost{ border-color:transparent; background:none; }
.btn.block{width:100%;}
.btn:disabled{opacity:.5; cursor:not-allowed;}
.btn-row{display:flex; gap:8px; flex-wrap:wrap;}

/* Forms */
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; }
.field input, .field select, .field textarea{
  width:100%; padding:11px 12px; border-radius:var(--radius-s); border:1px solid var(--hairline);
  background:var(--paper); color:var(--ink); font-size:14.5px;
}
.field input.num-input{font-family:var(--font-mono); font-weight:600;}
.field textarea{resize:vertical; min-height:60px;}
.field-row{display:flex; gap:10px;}
.field-row > .field{flex:1;}
.seg{ display:flex; border:1px solid var(--hairline); border-radius:var(--radius-s); overflow:hidden; }
.seg button{ flex:1; padding:9px 6px; border:none; background:var(--paper-raised); color:var(--ink-soft); font-size:12.5px; font-weight:600; cursor:pointer; border-right:1px solid var(--hairline);}
.seg button:last-child{border-right:none;}
.seg button.active{ background:var(--accent); color:#fff; }
.hint{font-size:11.5px; color:var(--ink-soft); margin-top:4px;}

/* Sheet / modal */
.overlay{
  position:fixed; inset:0; background:rgba(16,35,27,.45); z-index:50;
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .18s ease;
}
.overlay.open{opacity:1; pointer-events:auto;}
@media (min-width:640px){ .overlay{align-items:center;} }
.sheet{
  background:var(--paper-raised); width:100%; max-width:480px; max-height:88vh; overflow-y:auto;
  border-radius:20px 20px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(16px); transition:transform .18s ease;
}
.overlay.open .sheet{transform:translateY(0);}
@media (min-width:640px){ .sheet{border-radius:var(--radius-l); margin-bottom:0;} }
.sheet-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
.sheet-head h2{font-size:17px;}

.toast-wrap{position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:80; display:flex; flex-direction:column; gap:8px; width:min(360px,90vw);}
.toast{ background:var(--ink); color:var(--paper); font-size:13px; font-weight:500; padding:11px 14px; border-radius:var(--radius-s); box-shadow:var(--shadow); display:flex; align-items:center; justify-content:space-between; gap:10px;}
.toast button{background:none;border:none;color:inherit;font-weight:700;cursor:pointer;opacity:.7;}

.progress-track{height:6px;border-radius:99px;background:var(--hairline);overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);}

.chip-row{display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; margin-bottom:14px;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{ flex-shrink:0; font-size:12.5px; font-weight:600; padding:7px 13px; border-radius:999px; border:1px solid var(--hairline); background:var(--paper-raised); color:var(--ink-soft); cursor:pointer; white-space:nowrap;}
.chip.active{ background:var(--ink); border-color:var(--ink); color:var(--paper); }

.bar-chart{display:flex; align-items:flex-end; gap:8px; height:120px; padding-top:10px;}
.bar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end;}
.bar-col .bars{display:flex; gap:2px; align-items:flex-end; height:100%; width:100%; justify-content:center;}
.bar{width:9px; border-radius:3px 3px 0 0;}
.bar.income{background:var(--income);}
.bar.expense{background:var(--expense);}
.bar-col .lbl{font-size:10px; color:var(--ink-soft);}

.cat-bar-row{margin-bottom:12px;}
.cat-bar-row .top{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px;}
.cat-bar-row .top .amt{font-family:var(--font-mono); font-weight:600;}
.cat-track{height:7px;border-radius:99px;background:var(--hairline);overflow:hidden;}
.cat-fill{height:100%;border-radius:99px;}

.alert-banner{
  display:flex; gap:10px; align-items:flex-start; padding:12px 14px; border-radius:var(--radius-s);
  background:var(--pending-soft); border:1px solid transparent; margin-bottom:12px; font-size:13px;
}
.alert-banner.danger{background:var(--expense-soft);}
.alert-banner strong{display:block; font-size:13px; margin-bottom:1px;}

.swatch{width:14px;height:14px;border-radius:4px; flex-shrink:0;}
.swatch-row{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px;}
.swatch-pick{width:26px;height:26px;border-radius:50%; cursor:pointer; border:2px solid transparent;}
.swatch-pick.active{border-color:var(--ink);}

.divider{height:1px;background:var(--hairline); margin:16px 0;}
.hidden{display:none !important;}
.text-soft{color:var(--ink-soft); font-size:13px;}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-wrap" id="toastWrap"></div>
<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>

<script>
// ==== js/db.js ====
/* ============================================================
   DB — Capa de persistencia y modelo de datos
   Estrategia: localStorage como almacenamiento offline-first.
   Todo el estado vive en un único objeto serializado bajo la key
   'ledger:v1'. Esto simplifica el respaldo/exportación (un solo
   blob JSON) y deja la puerta abierta a reemplazar esta capa por
   IndexedDB o sincronización remota sin tocar el resto de la app:
   basta con reimplementar DB.load()/DB.save().

   Entidades:
   - accounts:   cuentas (débito, efectivo, ahorro, crédito, etc.)
   - categories: categorías/subcategorías de movimientos
   - movements:  todo movimiento (ingreso, gasto, transferencia, pago tarjeta, ajuste)
   - installmentPlans: compras en cuotas y su calendario
   - scheduled:  gastos programados/recurrentes
   ============================================================ */

const DB = (() => {
  const KEY = 'ledger:v1';

  function uid(prefix) {
    return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function todayISO() {
    return new Date().toISOString().slice(0, 10);
  }

  function seed() {
    const accounts = [
      { id: uid('acc'), name: 'Cuenta Corriente', type: 'corriente', initialBalance: 850000, currentBalance: 850000, currency: 'CLP', color: '#2D3A8C', active: true },
      { id: uid('acc'), name: 'Efectivo', type: 'efectivo', initialBalance: 45000, currentBalance: 45000, currency: 'CLP', color: '#1B8A5A', active: true },
      { id: uid('acc'), name: 'Ahorro', type: 'ahorro', initialBalance: 1200000, currentBalance: 1200000, currency: 'CLP', color: '#C9862A', active: true },
    ];
    const card = {
      id: uid('acc'), name: 'Tarjeta Visa', type: 'credito', initialBalance: 0, currentBalance: 0,
      currency: 'CLP', color: '#B23A2E', active: true,
      creditLimit: 900000, usedCredit: 0, billingDay: 5, dueDay: 15
    };
    accounts.push(card);

    const categories = [
      { id: uid('cat'), name: 'Alimentación', kind: 'expense', color: '#B23A2E' },
      { id: uid('cat'), name: 'Transporte', kind: 'expense', color: '#C9862A' },
      { id: uid('cat'), name: 'Hogar', kind: 'expense', color: '#8C6BB1' },
      { id: uid('cat'), name: 'Salud', kind: 'expense', color: '#3E8FB0' },
      { id: uid('cat'), name: 'Educación', kind: 'expense', color: '#4E7A51' },
      { id: uid('cat'), name: 'Suscripciones', kind: 'expense', color: '#B0559A' },
      { id: uid('cat'), name: 'Ocio', kind: 'expense', color: '#D4A24C' },
      { id: uid('cat'), name: 'Deudas', kind: 'expense', color: '#7A3E3E' },
      { id: uid('cat'), name: 'Otros', kind: 'expense', color: '#6B7A72' },
      { id: uid('cat'), name: 'Sueldo', kind: 'income', color: '#1B8A5A' },
      { id: uid('cat'), name: 'Ingreso extra', kind: 'income', color: '#3E8F6E' },
      { id: uid('cat'), name: 'Ahorro', kind: 'transfer', color: '#2D3A8C' },
    ];
    const catByName = Object.fromEntries(categories.map(c => [c.name, c.id]));

    const state = {
      accounts, categories,
      movements: [],
      installmentPlans: [],
      scheduled: [],
      settings: { theme: 'light', currency: 'CLP', locale: 'es-CL', lockEnabled: false, onboarded: true },
      meta: { version: 1, createdAt: todayISO() }
    };

    // Movimientos de ejemplo del mes actual
    const cash = accounts[0];
    Engine.applyIncome(state, { accountId: cash.id, amount: 1450000, categoryId: catByName['Sueldo'], description: 'Sueldo mensual', date: todayISO() });
    Engine.applyExpense(state, { accountId: cash.id, amount: 32000, categoryId: catByName['Alimentación'], description: 'Supermercado', date: todayISO() });
    Engine.applyExpense(state, { accountId: accounts[1].id, amount: 6500, categoryId: catByName['Transporte'], description: 'Bencina / bus', date: todayISO() });
    Engine.applyTransfer(state, { fromId: cash.id, toId: accounts[2].id, amount: 100000, description: 'Aporte ahorro mensual', date: todayISO() });
    Engine.applyInstallmentPurchase(state, {
      cardId: card.id, totalAmount: 240000, installmentsCount: 6,
      categoryId: catByName['Hogar'], description: 'Refrigerador', purchaseDate: todayISO()
    });

    state.scheduled.push(
      { id: uid('sch'), name: 'Arriendo', amount: 380000, categoryId: catByName['Hogar'], accountId: cash.id, frequency: 'monthly', dayOfMonth: 5, nextDate: nextMonthlyDate(5), status: 'pending', paused: false },
      { id: uid('sch'), name: 'Internet', amount: 24990, categoryId: catByName['Suscripciones'], accountId: cash.id, frequency: 'monthly', dayOfMonth: 12, nextDate: nextMonthlyDate(12), status: 'pending', paused: false },
      { id: uid('sch'), name: 'Plan celular', amount: 15990, categoryId: catByName['Suscripciones'], accountId: cash.id, frequency: 'monthly', dayOfMonth: 20, nextDate: nextMonthlyDate(20), status: 'pending', paused: false }
    );

    return state;
  }

  function nextMonthlyDate(day) {
    const now = new Date();
    let y = now.getFullYear(), m = now.getMonth();
    if (now.getDate() >= day) { m += 1; }
    const d = new Date(y, m, day);
    return d.toISOString().slice(0, 10);
  }

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) {
        const s = seed();
        save(s);
        return s;
      }
      return JSON.parse(raw);
    } catch (e) {
      console.error('DB.load error, reiniciando datos', e);
      const s = seed();
      save(s);
      return s;
    }
  }

  function save(state) {
    try {
      localStorage.setItem(KEY, JSON.stringify(state));
      return true;
    } catch (e) {
      console.error('DB.save error', e);
      return false;
    }
  }

  function exportCSV(state) {
    const rows = [['Fecha', 'Tipo', 'Cuenta', 'Categoría', 'Descripción', 'Monto', 'Estado']];
    state.movements.forEach(m => {
      const acc = state.accounts.find(a => a.id === m.accountId);
      const cat = state.categories.find(c => c.id === m.categoryId);
      rows.push([m.date, m.type, acc ? acc.name : '', cat ? cat.name : '', m.description || '', m.amount, m.status || 'paid']);
    });
    return rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  }

  function resetAll() {
    localStorage.removeItem(KEY);
    return load();
  }

  return { uid, todayISO, nextMonthlyDate, seed, load, save, exportCSV, resetAll };
})();

// ==== js/calc.js ====
/* ============================================================
   ENGINE — Reglas de negocio (la única fuente de verdad sobre
   cómo un movimiento afecta saldos y cupos). Ningún componente de
   UI debe tocar account.currentBalance o usedCredit directamente:
   todo pasa por aquí para evitar inconsistencias.

   REGLAS:
   1. Ingreso            -> += saldo cuenta destino.
   2. Gasto (cuenta no-crédito) -> -= saldo cuenta.
   3. Compra con tarjeta (1 o N cuotas) -> NO toca el saldo de ninguna
      cuenta de efectivo (no es un flujo de caja hoy). Aumenta usedCredit
      de la tarjeta en el monto total de la compra (deuda total generada)
      y genera un calendario de cuotas. usedCredit = deuda viva total,
      no solo lo facturado: así "cupo disponible" refleja lo que
      realmente queda para comprar, incluso con cuotas futuras.
   4. Pago de tarjeta -> -= saldo de la cuenta que paga, y -= usedCredit
      de la tarjeta en el monto pagado (se van saldando cuotas en orden).
   5. Transferencia entre cuentas propias -> -= origen, += destino.
      Se marca type:'transfer' y SIEMPRE se excluye de los totales de
      ingresos/gastos consolidados (si no, el dinero se contaría dos
      veces: una al "gastarse" de una cuenta y otra al "ingresar" a la otra).
   6. Ajuste de saldo -> fija el saldo a un valor manual y registra la
      diferencia como movimiento 'adjustment' (para trazabilidad).
   7. Gasto programado pagado -> se comporta como un Gasto (regla 2) y
      además avanza next Date según la frecuencia.

   BALANCE DISPONIBLE REAL vs BALANCE CONTABLE:
   - Balance contable = suma de saldos actuales de cuentas de efectivo
     (no incluye tarjetas de crédito: su "saldo" es deuda, no activo).
   - Disponible real = Balance contable
       − gastos programados con vencimiento en los próximos 7 días
       − cuotas de tarjeta que facturan este mes y siguen sin pagar
     Esto evita que el usuario vea saldo "libre" que en realidad ya
     está comprometido con pagos que vienen.
   ============================================================ */

const Engine = (() => {
  function round(n) { return Math.round(n); }

  function findAccount(state, id) { return state.accounts.find(a => a.id === id); }

  function pushMovement(state, mv) {
    mv.id = DB.uid('mov');
    mv.recordedDate = DB.todayISO();
    state.movements.push(mv);
    return mv;
  }

  function applyIncome(state, { accountId, amount, categoryId, description, date, tags }) {
    const acc = findAccount(state, accountId);
    acc.currentBalance += amount;
    return pushMovement(state, {
      type: 'income', amount, accountId, categoryId, description: description || '',
      date: date || DB.todayISO(), status: 'paid', tags: tags || []
    });
  }

  function applyExpense(state, { accountId, amount, categoryId, description, date, tags }) {
    const acc = findAccount(state, accountId);
    if (acc.type === 'credito') throw new Error('Usa applyInstallmentPurchase para gastos con tarjeta de crédito.');
    acc.currentBalance -= amount;
    return pushMovement(state, {
      type: 'expense', amount, accountId, categoryId, description: description || '',
      date: date || DB.todayISO(), status: 'paid', tags: tags || []
    });
  }

  function applyTransfer(state, { fromId, toId, amount, description, date }) {
    if (fromId === toId) throw new Error('La cuenta origen y destino no pueden ser la misma.');
    const from = findAccount(state, fromId), to = findAccount(state, toId);
    from.currentBalance -= amount;
    to.currentBalance += amount;
    return pushMovement(state, {
      type: 'transfer', amount, accountId: fromId, toAccountId: toId,
      description: description || '', date: date || DB.todayISO(), status: 'paid'
    });
  }

  function applyInstallmentPurchase(state, { cardId, totalAmount, installmentsCount, categoryId, description, purchaseDate }) {
    const card = findAccount(state, cardId);
    const n = Math.max(1, installmentsCount);
    const base = Math.floor(totalAmount / n);
    const remainder = totalAmount - base * n;
    const pDate = purchaseDate || DB.todayISO();
    const installments = [];
    for (let i = 0; i < n; i++) {
      const due = addMonths(pDate, i + 1);
      installments.push({
        n: i + 1,
        amount: base + (i === n - 1 ? remainder : 0),
        dueDate: due,
        status: 'pending'
      });
    }
    const plan = {
      id: DB.uid('plan'), cardId, totalAmount, installmentsCount: n,
      categoryId, description: description || '', purchaseDate: pDate, installments
    };
    state.installmentPlans.push(plan);
    card.usedCredit = (card.usedCredit || 0) + totalAmount;

    pushMovement(state, {
      type: 'expense', subtype: 'installment_purchase', amount: totalAmount, accountId: cardId,
      categoryId, description: description || '', date: pDate, status: n === 1 ? 'scheduled' : 'scheduled',
      installments: n, planId: plan.id, isCredit: true
    });
    return plan;
  }

  function addMonths(iso, months) {
    const d = new Date(iso + 'T00:00:00');
    d.setMonth(d.getMonth() + months);
    return d.toISOString().slice(0, 10);
  }

  // Paga la(s) próxima(s) cuota(s) pendiente(s) de un plan, debitando accountId (cuenta que paga)
  function payInstallments(state, { planId, accountId, count = 1 }) {
    const plan = state.installmentPlans.find(p => p.id === planId);
    const card = findAccount(state, plan.cardId);
    const payer = findAccount(state, accountId);
    const pending = plan.installments.filter(i => i.status === 'pending').sort((a, b) => a.n - b.n);
    const toPay = pending.slice(0, count);
    if (!toPay.length) return null;
    const total = toPay.reduce((s, i) => s + i.amount, 0);
    toPay.forEach(i => { i.status = 'paid'; i.paidDate = DB.todayISO(); });
    payer.currentBalance -= total;
    card.usedCredit = Math.max(0, (card.usedCredit || 0) - total);
    return pushMovement(state, {
      type: 'card_payment', amount: total, accountId, toAccountId: plan.cardId,
      description: `Pago cuota${toPay.length > 1 ? 's' : ''} — ${plan.description}`,
      date: DB.todayISO(), status: 'paid', planId
    });
  }

  function payFullPlan(state, { planId, accountId }) {
    const plan = state.installmentPlans.find(p => p.id === planId);
    const pendingCount = plan.installments.filter(i => i.status === 'pending').length;
    return payInstallments(state, { planId, accountId, count: pendingCount });
  }

  function markScheduledPaid(state, schedId, accountId) {
    const sch = state.scheduled.find(s => s.id === schedId);
    const acc = findAccount(state, accountId || sch.accountId);
    acc.currentBalance -= sch.amount;
    pushMovement(state, {
      type: 'expense', subtype: 'scheduled', amount: sch.amount, accountId: acc.id,
      categoryId: sch.categoryId, description: sch.name, date: DB.todayISO(), status: 'paid', schedId
    });
    sch.lastPaidDate = DB.todayISO();
    sch.nextDate = advanceDate(sch.nextDate, sch.frequency, sch.dayOfMonth);
    return sch;
  }

  function advanceDate(iso, frequency, dayOfMonth) {
    const d = new Date(iso + 'T00:00:00');
    if (frequency === 'weekly') d.setDate(d.getDate() + 7);
    else if (frequency === 'monthly') { d.setMonth(d.getMonth() + 1); if (dayOfMonth) d.setDate(dayOfMonth); }
    else d.setMonth(d.getMonth() + 1);
    return d.toISOString().slice(0, 10);
  }

  function applyAdjustment(state, { accountId, newBalance, note }) {
    const acc = findAccount(state, accountId);
    const diff = newBalance - acc.currentBalance;
    acc.currentBalance = newBalance;
    return pushMovement(state, {
      type: 'adjustment', amount: diff, accountId, description: note || 'Ajuste de saldo',
      date: DB.todayISO(), status: 'paid'
    });
  }

  function deleteMovement(state, movId) {
    const idx = state.movements.findIndex(m => m.id === movId);
    if (idx === -1) return false;
    const mv = state.movements[idx];
    // Revertir efecto en saldos para mantener consistencia
    if (mv.type === 'income') findAccount(state, mv.accountId).currentBalance -= mv.amount;
    else if (mv.type === 'expense' && !mv.isCredit) findAccount(state, mv.accountId).currentBalance += mv.amount;
    else if (mv.type === 'transfer') {
      findAccount(state, mv.accountId).currentBalance += mv.amount;
      findAccount(state, mv.toAccountId).currentBalance -= mv.amount;
    } else if (mv.type === 'adjustment') {
      findAccount(state, mv.accountId).currentBalance -= mv.amount;
    }
    state.movements.splice(idx, 1);
    return true;
  }

  function deleteAccount(state, accountId) {
    const acc = findAccount(state, accountId);
    acc.active = false; // se desactiva, nunca se borra: preserva historial
  }

  return {
    applyIncome, applyExpense, applyTransfer, applyInstallmentPurchase,
    payInstallments, payFullPlan, markScheduledPaid, applyAdjustment,
    deleteMovement, deleteAccount, addMonths, advanceDate
  };
})();

/* ============================================================
   CALC — Agregaciones para dashboard y reportes (solo lectura)
   ============================================================ */
const Calc = (() => {
  const fmt = (n, currency = 'CLP') => {
    try { return new Intl.NumberFormat('es-CL', { style: 'currency', currency, maximumFractionDigits: 0 }).format(n || 0); }
    catch (e) { return '$' + Math.round(n || 0).toLocaleString('es-CL'); }
  };

  function cashAccounts(state) { return state.accounts.filter(a => a.type !== 'credito' && a.active); }
  function creditAccounts(state) { return state.accounts.filter(a => a.type === 'credito' && a.active); }

  function balanceTotal(state) { return cashAccounts(state).reduce((s, a) => s + a.currentBalance, 0); }

  function scheduledDueWithin(state, days) {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const limit = new Date(today); limit.setDate(limit.getDate() + days);
    return state.scheduled.filter(s => !s.paused && new Date(s.nextDate) >= today && new Date(s.nextDate) <= limit);
  }

  function installmentsDueThisMonthUnpaid(state) {
    const now = new Date(); const ym = now.toISOString().slice(0, 7);
    let list = [];
    state.installmentPlans.forEach(p => {
      p.installments.forEach(i => {
        if (i.status === 'pending' && i.dueDate.slice(0, 7) === ym) list.push({ plan: p, inst: i });
      });
    });
    return list;
  }

  function disponibleReal(state) {
    const total = balanceTotal(state);
    const prox = scheduledDueWithin(state, 7).reduce((s, x) => s + x.amount, 0);
    const cuotasMes = installmentsDueThisMonthUnpaid(state).reduce((s, x) => s + x.inst.amount, 0);
    return total - prox - cuotasMes;
  }

  function movementsOn(state, dateISO) { return state.movements.filter(m => m.date === dateISO); }

  function todayFlows(state) {
    const t = DB.todayISO();
    const list = movementsOn(state, t);
    const ingresos = list.filter(m => m.type === 'income').reduce((s, m) => s + m.amount, 0);
    const gastos = list.filter(m => m.type === 'expense' && !m.isCredit).reduce((s, m) => s + m.amount, 0);
    return { ingresos, gastos };
  }

  function monthFlows(state, monthsAgo = 0) {
    const d = new Date(); d.setMonth(d.getMonth() - monthsAgo);
    const ym = d.toISOString().slice(0, 7);
    const list = state.movements.filter(m => m.date.slice(0, 7) === ym);
    const ingresos = list.filter(m => m.type === 'income').reduce((s, m) => s + m.amount, 0);
    const gastos = list.filter(m => m.type === 'expense' && !m.isCredit).reduce((s, m) => s + m.amount, 0);
    return { ym, ingresos, gastos, neto: ingresos - gastos };
  }

  function gastosPorCategoria(state, monthsAgo = 0) {
    const d = new Date(); d.setMonth(d.getMonth() - monthsAgo);
    const ym = d.toISOString().slice(0, 7);
    const list = state.movements.filter(m => m.date.slice(0, 7) === ym && m.type === 'expense' && !m.isCredit);
    const byCat = {};
    list.forEach(m => { byCat[m.categoryId] = (byCat[m.categoryId] || 0) + m.amount; });
    return Object.entries(byCat)
      .map(([catId, total]) => ({ cat: state.categories.find(c => c.id === catId), total }))
      .filter(x => x.cat)
      .sort((a, b) => b.total - a.total);
  }

  function totalDeudaTarjetas(state) { return creditAccounts(state).reduce((s, a) => s + (a.usedCredit || 0), 0); }
  function cupoDisponible(a) { return Math.max(0, (a.creditLimit || 0) - (a.usedCredit || 0)); }
  function pctUsado(a) { return a.creditLimit ? Math.min(100, Math.round(((a.usedCredit || 0) / a.creditLimit) * 100)) : 0; }

  function proximosVencimientos(state, days = 14) {
    const sch = scheduledDueWithin(state, days).map(s => ({
      kind: 'scheduled', date: s.nextDate, name: s.name, amount: s.amount, ref: s
    }));
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const limit = new Date(today); limit.setDate(limit.getDate() + days);
    const inst = [];
    state.installmentPlans.forEach(p => p.installments.forEach(i => {
      if (i.status === 'pending' && new Date(i.dueDate) >= today && new Date(i.dueDate) <= limit) {
        inst.push({ kind: 'installment', date: i.dueDate, name: `${p.description} (cuota ${i.n}/${p.installmentsCount})`, amount: i.amount, ref: p });
      }
    }));
    return [...sch, ...inst].sort((a, b) => a.date.localeCompare(b.date));
  }

  function alerts(state) {
    const out = [];
    cashAccounts(state).forEach(a => {
      if (a.currentBalance < 15000) out.push({ level: 'warn', text: `Saldo bajo en ${a.name}: ${fmt(a.currentBalance)}` });
    });
    creditAccounts(state).forEach(a => {
      if (pctUsado(a) >= 85) out.push({ level: 'danger', text: `${a.name} usa ${pctUsado(a)}% del cupo disponible` });
    });
    proximosVencimientos(state, 3).forEach(v => {
      out.push({ level: 'warn', text: `${v.name} vence el ${v.date} — ${fmt(v.amount)}` });
    });
    return out;
  }

  function lastMovements(state, n = 8) {
    return [...state.movements].sort((a, b) => (b.date + b.id).localeCompare(a.date + a.id)).slice(0, n);
  }

  function last6MonthsFlow(state) {
    const out = [];
    for (let i = 5; i >= 0; i--) out.push(monthFlows(state, i));
    return out;
  }

  return {
    fmt, cashAccounts, creditAccounts, balanceTotal, disponibleReal, scheduledDueWithin,
    installmentsDueThisMonthUnpaid, todayFlows, monthFlows, gastosPorCategoria,
    totalDeudaTarjetas, cupoDisponible, pctUsado, proximosVencimientos, alerts,
    lastMovements, last6MonthsFlow
  };
})();

    lock: '<rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>',
  };
  function icon(name, cls = 'ic') {
    return `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICONS[name] || ''}</svg>`;
  }

  function toast(msg, opts = {}) {
    const wrap = document.getElementById('toastWrap');
    const el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = `<span>${msg}</span>`;
    const closeBtn = document.createElement('button');
    closeBtn.innerHTML = '✕';
    closeBtn.onclick = () => el.remove();
    el.appendChild(closeBtn);
    if (opts.undo) {
      const undoBtn = document.createElement('button');
      undoBtn.textContent = 'Deshacer';
      undoBtn.style.textDecoration = 'underline';
      undoBtn.onclick = () => { opts.undo(); el.remove(); };
      el.insertBefore(undoBtn, closeBtn);
    }
    wrap.appendChild(el);
    setTimeout(() => el.remove(), opts.duration || 4000);
  }

  function openSheet(html, onOpen) {
    const overlay = document.getElementById('overlay');
    const sheet = document.getElementById('sheet');
    sheet.innerHTML = html;
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    if (onOpen) onOpen(sheet);
    overlay.onclick = (e) => { if (e.target === overlay) closeSheet(); };
  }
  function closeSheet() {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function fmtDateHuman(iso) {
    if (!iso) return '';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('es-CL', { day: '2-digit', month: 'short' });
  }

  function daysUntil(iso) {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const d = new Date(iso + 'T00:00:00');
    return Math.round((d - today) / 86400000);
  }

  function el(html) {
    const t = document.createElement('template');
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  }

  return { icon, toast, openSheet, closeSheet, fmtDateHuman, daysUntil, el };
})();
